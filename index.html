<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Awesome Love -- Discography</title>
<style>
  :root{
    --bg-top:#131316;
    --bg-bottom:#040405;
    --chrome-hi:#f5f6f8;
    --chrome-mid:#c7c9cf;
    --chrome-lo:#8a8a90;
    --ink:#f2f2f4;
    --ink-dim:#9a9aa2;
    --accent:#3d7fe0;
    --panel: rgba(255,255,255,0.05);
    --panel-border: rgba(255,255,255,0.1);
  }
  *{box-sizing:border-box;}
  html,body{
    height:100%;
    margin:0;
    background: radial-gradient(ellipse at 50% -10%, var(--bg-top), var(--bg-bottom) 72%);
    color:var(--ink);
    font-family:-apple-system, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
  }
  #app{
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* ---------- TOP BAR ---------- */
  .topbar{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:10px 16px 6px;
    flex-shrink:0;
    z-index:30;
    height:54px;
  }

  .topbar .brand{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-dim);
    font-weight:600;
  }
  .topbar{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:14px 16px 6px;
    flex-shrink:0;
    position:relative;
    z-index:30;
  }


  /* ---------- COVER FLOW STAGE ---------- */
  .stage{
    position:relative;
    flex:1 1 auto;
    min-height:0;
    width:100%;
    perspective:1400px;
    perspective-origin:50% 40%;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    cursor:grab;
    touch-action:pan-y;
  }
  .stage.grabbing{ cursor:grabbing; }

  /* ambient room glow, tinted by the active album's artwork */
  .glow{
    position:absolute;
    inset:-12%;
    pointer-events:none;
    z-index:1;
    opacity:0;
    transition:opacity 1.1s ease;
  }
  @media (max-width: 600px){
    .glow{ opacity:0 !important; display:none; }
  }

  .flow{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    z-index:10;
  }
  .cover-wrap{
    position:absolute;
    top:50%;
    left:50%;
    width:min(34vw, 300px);
    height:min(34vw, 300px);
    transform-style:preserve-3d;
    cursor:pointer;
    will-change: transform;
  }
  @media (max-width: 600px){
    .cover-wrap{
      width: min(38vw, 160px);
      height: min(38vw, 160px);
    }
    .stage{
      perspective: 600px;
      perspective-origin: 50% 45%;
    }
    .track-panel{
      max-height: 28vh;
    }
    .info .title{
      font-size: 16px;
    }
    .info .meta{
      font-size: 11px;
    }
  }
  .cover-art{
    position:absolute;
    inset:0;
    border-radius:3px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.6), 0 2px 0 rgba(255,255,255,0.05) inset;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cover-art::after{
    /* glossy diagonal sheen */
    content:"";
    position:absolute;
    top:0; left:-60%;
    width:45%; height:100%;
    background:linear-gradient(115deg, rgba(255,255,255,0.28), rgba(255,255,255,0) 55%);
    transform:skewX(-18deg);
    pointer-events:none;
  }
  .cover-monogram{
    font-size:15%;
    font-weight:700;
    color:rgba(255,255,255,0.85);
    letter-spacing:0.02em;
    text-shadow:0 2px 8px rgba(0,0,0,0.35);
    z-index:1;
  }
  .cover-reflection{
    position:absolute;
    top:100%;
    left:0; right:0;
    height:70%;
    transform:scaleY(-1);
    border-radius:3px;
    overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,0.34), transparent 68%);
            mask-image:linear-gradient(to bottom, rgba(0,0,0,0.34), transparent 68%);
    opacity:0.9;
  }

  /* ---------- INFO CARD ---------- */
  .info{
    text-align:center;
    padding:2px 20px 10px;
    flex-shrink:0;
    position:relative;
    z-index:20;
    transition:opacity 0.22s ease;
  }
  .info.content-fading{ opacity:0; }
  .info .title{
    font-size:clamp(18px,3vw,26px);
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .info .meta{
    margin-top:4px;
    font-size:13px;
    color:var(--ink-dim);
    letter-spacing:0.02em;
    opacity:1;
  }
  .info .meta span{ margin:0 6px; }

  /* ---------- TRACK PANEL ---------- */
  .track-panel{
    flex-shrink:0;
    max-height:34vh;
    overflow-y:auto;
    background: var(--panel);
    border-top:1px solid var(--panel-border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding:6px 0 4px;
    position:relative;
    z-index:20;
    transition:opacity 0.22s ease;
  }
  .track-panel.content-fading{ opacity:0; }
  .track-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:9px 22px;
    cursor:pointer;
    border-bottom:1px solid rgba(255,255,255,0.045);
  }
  .track-row:hover{ background:rgba(255,255,255,0.04); }
  .track-row.playing{ background:rgba(61,127,224,0.14); }
  .track-num{
    width:20px;
    text-align:right;
    font-size:12px;
    color:var(--ink-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink:0;
  }
  .track-row.playing .track-num{ color:transparent; position:relative; }
  .track-row.playing .track-num::before{
    content:"♪";
    color:var(--accent);
    position:absolute; right:0;
  }
  .track-name{
    flex:1 1 auto;
    font-size:14.5px;
    font-weight:500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .track-row.playing .track-name{ color:var(--accent); }
  .track-len{
    font-size:12px;
    color:var(--ink-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink:0;
  }

  /* ---------- TRANSPORT BAR ---------- */
  .transport{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:16px;
    padding:12px 22px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(to bottom, #17171a, #0a0a0c);
    border-top:1px solid rgba(255,255,255,0.07);
    position:relative;
    z-index:30;
  }
  .now-playing{
    flex:1 1 auto;
    min-width:0;
    font-size:12.5px;
    color:var(--ink-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .now-playing strong{ color:var(--ink); font-weight:600; }
  .transport-controls{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .tbtn{
    width:34px; height:34px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.14);
    background:linear-gradient(to bottom, #3a3a3e, #232326);
    color:var(--chrome-hi);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 1px 0 rgba(255,255,255,0.08) inset, 0 2px 6px rgba(0,0,0,0.4);
  }
  .tbtn:hover{ filter:brightness(1.15); }
  .tbtn.play{
    width:40px; height:40px;
    background:linear-gradient(to bottom, var(--accent), #2a5db0);
    border-color: rgba(255,255,255,0.2);
  }
  .tbtn svg{ width:14px; height:14px; fill:currentColor; }
  .tbtn.play svg{ width:15px; height:15px; }

  .progress-wrap{
    display:none;
    align-items:center;
    gap:8px;
    flex:1 1 220px;
  }
  .progress-time{ font-size:11px; color:var(--ink-dim); font-variant-numeric: tabular-nums; width:34px; }
  .progress-bar{
    flex:1;
    height:4px;
    border-radius:2px;
    background:rgba(255,255,255,0.14);
    position:relative;
    cursor:pointer;
  }
  .progress-fill{
    position:absolute; top:0; left:0; bottom:0;
    width:0%;
    border-radius:2px;
    background:var(--accent);
  }

  @media (min-width: 720px){
    .progress-wrap{ display:flex; }
  }

  .donate-btn{
    font-size:11px;
    font-weight:600;
    color:rgba(255,255,255,0.72);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:5px 13px;
    cursor:pointer;
    text-decoration:none;
    letter-spacing:0.03em;
    transition:background 0.18s, color 0.18s;
    white-space:nowrap;
  }
  .donate-btn:hover{ background:rgba(255,255,255,0.15); color:#fff; }
  .story-btn{
    justify-self:start;
    font-size:11px;
    font-weight:600;
    color:rgba(255,255,255,0.72);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:5px 13px;
    cursor:pointer;
    text-decoration:none;
    letter-spacing:0.03em;
    transition:background 0.18s, color 0.18s;
    white-space:nowrap;
  }
  .story-btn:hover{ background:rgba(255,255,255,0.15); color:#fff; }

  .track-plays{
    font-size:11.5px;
    color:var(--accent);
    opacity:0.9;
    font-variant-numeric:tabular-nums;
    flex-shrink:0;
    min-width:36px;
    text-align:left;
    letter-spacing:0.02em;
  }
  .track-plays::before{
    content:"▶ ";
    font-size:7px;
    vertical-align:2px;
    opacity:0.6;
  }

  .logo-wrap .brand-logo{
    height:30px !important;
    width:auto !important;
    max-height:30px !important;
    display:block;
    opacity:0.92;
  }
  .logo-wrap{
    justify-self:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
  }
  .total-plays-top{
    font-size:10px;
    color:var(--accent);
    font-weight:700;
    letter-spacing:0.07em;
    text-transform:uppercase;
    opacity:0.9;
    min-height:13px;
    text-align:center;
  }
  .clothing-link{
    font-size:10px;
    color:rgba(255,255,255,0.45);
    text-decoration:none;
    letter-spacing:0.05em;
    transition: color 0.18s ease;
    margin-top:1px;
  }
  .clothing-link:hover{ color:rgba(255,255,255,0.85); }

  .games-link{
    font-size:10px;
    color:rgba(255,255,255,0.45);
    text-decoration:none;
    letter-spacing:0.05em;
    transition: color 0.18s ease;
    margin-top:1px;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }
  .games-link:hover{ color:rgba(255,255,255,0.85); }

  @media(max-width:500px){
    .story-btn, .donate-btn{ font-size:10px; padding:4px 9px; }
  }

  /* ---- floating hearts ---- */
  .hearts-canvas{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:2;
  }
  .heart{
    position:absolute;
    bottom:-60px;
    font-size:20px;
    opacity:0;
    animation: floatHeart linear infinite;
    user-select:none;
    filter: blur(0px);
  }
  @keyframes floatHeart{
    0%   { transform: translateY(0) translateX(0) scale(0.6) rotate(-10deg); opacity:0; }
    8%   { opacity: 0.6; }
    50%  { transform: translateY(-55vh) translateX(var(--dx, 20px)) scale(0.9) rotate(6deg); }
    90%  { opacity: 0.12; }
    100% { transform: translateY(-110vh) translateX(var(--dx, 20px)) scale(1.1) rotate(15deg); opacity:0; }
  }

  /* ---- per-album story button ---- */
  .album-story-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:8px;
    font-size:11px;
    font-weight:600;
    color:rgba(255,255,255,0.78);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.16);
    border-radius:20px;
    padding:5px 14px;
    cursor:pointer;
    letter-spacing:0.04em;
    font-family:inherit;
    transition:background 0.18s, color 0.18s, border-color 0.18s;
  }
  .album-story-btn:hover{
    background:rgba(255,255,255,0.16);
    color:#fff;
    border-color:rgba(255,255,255,0.3);
  }

  /* ---- info action row (story + fullscreen buttons) ---- */
  .info-actions{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
    margin-top:8px;
  }
  .album-fullscreen-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:600;
    color:rgba(255,255,255,0.78);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.16);
    border-radius:20px;
    padding:5px 14px;
    cursor:pointer;
    letter-spacing:0.04em;
    font-family:inherit;
    transition:background 0.18s, color 0.18s, border-color 0.18s;
  }
  .album-fullscreen-btn:hover{
    background:rgba(255,255,255,0.16);
    color:#fff;
    border-color:rgba(255,255,255,0.3);
  }

  /* ---- fullscreen now-playing view ---- */
  .fs-overlay{
    position:fixed;
    inset:0;
    z-index:110;
    background:#050506;
    display:none;
    opacity:0;
    transition:opacity 0.32s ease;
    overflow:hidden;
  }
  .fs-overlay.open{ display:block; }
  .fs-overlay.visible{ opacity:1; }
  .fs-bg{
    position:absolute;
    inset:-10%;
    background-size:cover;
    background-position:center;
    filter:blur(60px) saturate(1.3) brightness(0.55);
    transform:scale(1.15);
  }
  .fs-bg-shade{
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse at 50% 30%, rgba(0,0,0,0.15), rgba(4,4,5,0.88) 78%);
  }
  .fs-hearts{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:1;
  }
  .fs-close{
    position:absolute;
    top:18px; right:18px;
    z-index:20;
    width:38px; height:38px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(255,255,255,0.08);
    color:var(--ink);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background 0.18s;
  }
  .fs-close:hover{ background:rgba(255,255,255,0.18); }
  .fs-content{
    position:relative;
    z-index:10;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 24px calc(28px + env(safe-area-inset-bottom));
    gap:26px;
  }
  .fs-cover{
    width:min(56vw, 60vh, 420px);
    height:min(56vw, 60vh, 420px);
    border-radius:10px;
    background-size:cover;
    background-position:center;
    box-shadow:0 40px 90px rgba(0,0,0,0.65), 0 4px 0 rgba(255,255,255,0.06) inset;
    position:relative;
    overflow:hidden;
  }
  .fs-cover::after{
    content:"";
    position:absolute;
    top:0; left:-60%;
    width:45%; height:100%;
    background:linear-gradient(115deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 55%);
    transform:skewX(-18deg);
  }
  .fs-text{
    text-align:center;
    max-width:90vw;
  }
  .fs-title{
    font-size:clamp(20px,4vw,30px);
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .fs-sub{
    margin-top:5px;
    font-size:13.5px;
    color:var(--ink-dim);
    letter-spacing:0.03em;
  }
  .fs-progress-wrap{
    width:min(86vw, 460px);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .fs-progress-bar{
    flex:1;
    height:5px;
    border-radius:3px;
    background:rgba(255,255,255,0.16);
    position:relative;
    cursor:pointer;
  }
  .fs-progress-fill{
    position:absolute; top:0; left:0; bottom:0;
    width:0%;
    border-radius:3px;
    background:var(--accent);
  }
  .fs-time{
    font-size:11px;
    color:var(--ink-dim);
    font-variant-numeric:tabular-nums;
    width:34px;
  }
  .fs-controls{
    display:flex;
    align-items:center;
    gap:22px;
  }
  .fs-tbtn{
    width:44px; height:44px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.16);
    background:linear-gradient(to bottom, #3a3a3e, #232326);
    color:var(--chrome-hi);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 1px 0 rgba(255,255,255,0.08) inset, 0 2px 6px rgba(0,0,0,0.4);
  }
  .fs-tbtn:hover{ filter:brightness(1.15); }
  .fs-tbtn.fs-play{
    width:56px; height:56px;
    background:linear-gradient(to bottom, var(--accent), #2a5db0);
    border-color: rgba(255,255,255,0.2);
  }
  .fs-tbtn svg{ width:17px; height:17px; fill:currentColor; }
  .fs-tbtn.fs-play svg{ width:20px; height:20px; }
  @media (max-width:600px){
    .fs-content{ gap:20px; padding:32px 18px calc(24px + env(safe-area-inset-bottom)); }
  }

  /* ---- story modal ---- */
  .story-overlay{
    position:fixed;
    inset:0;
    z-index:100;
    background:rgba(0,0,0,0.62);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    opacity:0;
    transition:opacity 0.28s ease;
  }
  .story-overlay.open{ display:flex; }
  .story-overlay.visible{ opacity:1; }
  .story-card{
    position:relative;
    width:min(680px, 100%);
    max-height:min(78vh, 760px);
    display:flex;
    flex-direction:column;
    background:linear-gradient(to bottom, #1c1c20, #101013);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:16px;
    box-shadow:0 30px 80px rgba(0,0,0,0.7);
    overflow:hidden;
    transform:translateY(14px) scale(0.98);
    transition:transform 0.28s ease;
  }
  .story-overlay.visible .story-card{ transform:translateY(0) scale(1); }
  .story-head{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 20px 14px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.03);
  }
  .story-head .story-cover{
    width:52px; height:52px;
    border-radius:6px;
    background-size:cover;
    background-position:center;
    box-shadow:0 6px 16px rgba(0,0,0,0.5);
    flex-shrink:0;
  }
  .story-head .story-titles{ min-width:0; flex:1; }
  .story-head .story-album{
    font-size:16px;
    font-weight:700;
    letter-spacing:-0.01em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .story-head .story-sub{
    margin-top:2px;
    font-size:11px;
    color:var(--ink-dim);
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .story-close{
    flex-shrink:0;
    width:32px; height:32px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.07);
    color:var(--ink);
    font-size:16px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background 0.18s;
  }
  .story-close:hover{ background:rgba(255,255,255,0.16); }
  .story-body{
    overflow-y:auto;
    padding:20px 24px 28px;
    -webkit-overflow-scrolling:touch;
  }
  .story-body p{
    margin:0 0 16px;
    font-size:14.5px;
    line-height:1.72;
    color:rgba(255,255,255,0.88);
  }
  .story-body p:last-child{ margin-bottom:0; }
  @media (max-width:600px){
    .story-overlay{ padding:12px; }
    .story-card{ max-height:84vh; }
    .story-body{ padding:16px 18px 24px; }
    .story-body p{ font-size:14px; }
  }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.15); border-radius:3px; }
</style>
</head>

    story: `This Album Was Made When I Was Struggling My Most With Losing My Mom And Her Death.

I Needed Something to Calm Me Down.

This Is When I Created Music That is Really What I Love To Think of As Perfect Background Music. Because I Don't Think This Album Gets Old Easily — Listening To It quietly While You Do Life's Daily Tasks.

Originally It Sounded A lot Like Awesome, With A Heavy Focus On Singing The First Five Notes in a Major Scale. I Decided To Simplify It After I Made Glorious, With A lot Of Rest Between Me Singing, and Made It Focus on What I Call The Heart Notes. The Heart Notes are C E G in C Major =-)

With My Focus on a Uniquely Longful Restful Album I Carried on Creating Until I Eventually Discovered My Love of Pads Alone.

After Discovering My Love of Pads and Rest and my Desire to Sing Exclusively the Heart Notes, I Went On To Craft This Album from August 2022 to its Release in September 2024.

Particularly Focusing Around A Major, A Favorite Feeling Key =-) and G Major, another Favorite Feeling Key, and C Major, probably the Friendliest Key — Because it's the First One We Musicians Learn, And The Piano Is Designed around it, and it's Awesome haha =-)

With the album Phenomenal I did 100's and 100's of takes of each part of a word — Ah's and O's included =-) Listening Closely to My Voice Isolated Alone before moving on, building the entire song piece by piece.

/* ---------- build ---------- */
function buildCovers(){
  flow.innerHTML = '';
  releases.forEach((rel, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'cover-wrap';
    wrap.dataset.index = i;

    const art = document.createElement('div');
    art.className = 'cover-art';
    if (rel.cover) {
      art.style.backgroundImage = `url("${rel.cover}")`;
      art.style.backgroundSize = 'cover';
      art.style.backgroundPosition = 'center';
    } else {
      art.style.background = `linear-gradient(155deg, ${rel.gradient[0]}, ${rel.gradient[1]})`;
      const mono = document.createElement('div');
      mono.className = 'cover-monogram';
      mono.textContent = rel.monogram || (i+1);
      art.appendChild(mono);
    }

    const reflection = art.cloneNode(true);
    reflection.className = 'cover-reflection';

    wrap.appendChild(art);

/* ---------- album color extraction (for the room glow) ---------- */
function computeAlbumColor(i){
  const rel = releases[i];
  if (!rel.cover){
    albumColors[i] = rel.gradient[0];
    if (i === activeIndex) setGlow(albumColors[i]);
    return;
  }
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const c = document.createElement('canvas');
      c.width = 12; c.height = 12;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 12, 12);
      const d = ctx.getImageData(0, 0, 12, 12).data;
      let r=0,g=0,b=0,n=0;
      for (let p = 0; p < d.length; p += 4){
        r += d[p]; g += d[p+1]; b += d[p+2]; n++;
      }
      r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n);
      albumColors[i] = `rgb(${r},${g},${b})`;
    } catch(e) {
      albumColors[i] = rel.gradient ? rel.gradient[0] : '#3d7fe0';
    }
    if (i === activeIndex) setGlow(albumColors[i]);
  };
  img.onerror = () => {
    albumColors[i] = rel.gradient ? rel.gradient[0] : '#3d7fe0';
    if (i === activeIndex) setGlow(albumColors[i]);
  };
  img.src = rel.cover;
}

/* ---------- room glow (two layers crossfade) ---------- */
let glowFlip = false;
function toGlowRgba(color, a){
  if (color.startsWith('rgb(')) return color.replace('rgb(', 'rgba(').replace(')', `,${a})`);
  // hex
  const h = color.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function setGlow(color){
  if (!color) return;
  const show = glowFlip ? glowB : glowA;
  const hide = glowFlip ? glowA : glowB;
  glowFlip = !glowFlip;
  show.style.background =
    `radial-gradient(ellipse 62% 52% at 50% 42%, ${toGlowRgba(color, 0.30)}, ${toGlowRgba(color, 0.10)} 45%, transparent 72%)`;
  show.style.opacity = 1;
  hide.style.opacity = 0;
}

/* ---------- layout (runs every frame) ---------- */
function layoutCoversAt(pos){
  const wraps = flow.children;
  for (let i = 0; i < wraps.length; i++){
    const wrap = wraps[i];
    const offset = i - pos;
    const abs = Math.abs(offset);
    const dir = offset === 0 ? 0 : (offset > 0 ? 1 : -1);
    const t = Math.min(abs, 1); // 0 at center -> 1 at first neighbor

    const ry = -dir * t * 42;
    const scale = 1 - 0.18 * t;
    const tz = -90 * t - 40 * Math.max(abs - 1, 0);
    const opacity = abs > 6 ? 0 : 1 - 0.05 * Math.max(abs - 1, 0);
    // Use vw-based spread so positioning is always relative to screen width,
    // not cover size -- this fixes mobile portrait AND landscape
    const vw = window.innerWidth / 100;
    const coverW = flow.firstElementChild ? flow.firstElementChild.getBoundingClientRect().width : 200;
    // convert vw spread to percentage of cover width (since transform uses %)
    const spreadVW = window.innerWidth < 600 ? 22 : 40; // vw units
    const extraVW  = window.innerWidth < 600 ? 8  : 14;
    const spreadPct = (spreadVW * vw) / coverW * 100;
    const extraPct  = (extraVW  * vw) / coverW * 100;
    const pxOffset = dir * (spreadPct * t + extraPct * Math.max(abs - 1, 0));

    wrap.style.transform =
      `translate(-50%,-50%) translateX(${pxOffset}%) translateZ(${tz}px) rotateY(${ry}deg) scale(${scale})`;
    wrap.style.zIndex = Math.round(200 - abs * 10);
    wrap.style.opacity = Math.max(0, opacity);
  }
}

/* ---------- nearest-cover content sync (crossfade) ---------- */
let fadeTimer = null;
function syncNearest(){
  const n = Math.max(0, Math.min(MAX_IDX, Math.round(flowPos)));
  if (n === activeIndex) return;
  activeIndex = n;
  setGlow(albumColors[n]);
  infoCard.classList.add('content-fading');
  trackPanel.classList.add('content-fading');
  clearTimeout(fadeTimer);
  fadeTimer = setTimeout(() => {
    renderInfo();
    renderTracks();
    infoCard.classList.remove('content-fading');
    trackPanel.classList.remove('content-fading');

}

/* ---------- physics loop ---------- */
const SPRING = 0.14;
const FRICTION = 0.94;

function clampPos(p){ return Math.max(0, Math.min(MAX_IDX, p)); }

function tick(){
  if (!isDragging){
    if (targetPos !== null){
      const diff = targetPos - flowPos;
      flowPos += diff * SPRING;
      if (Math.abs(diff) < 0.002){
        flowPos = targetPos;
        targetPos = null;
      }
    } else if (Math.abs(velocity) > 0.0004){
      flowPos += velocity;
      velocity *= FRICTION;
      if (flowPos <= 0 || flowPos >= MAX_IDX){
        flowPos = clampPos(flowPos);
        velocity = 0;
        targetPos = Math.round(flowPos);
      } else if (Math.abs(velocity) < 0.006){
        velocity = 0;
        targetPos = Math.round(flowPos);
      }
    }
  }

  layoutCoversAt(flowPos);
  syncNearest();
  requestAnimationFrame(tick);
}

/* ---------- global play counters ---------- */
const COUNTER_API = "https://awesome-plays.awesomeahsum.workers.dev";

function playKey(relIdx, trackIdx){ return releases[relIdx].title + '::' + releases[relIdx].tracks[trackIdx].title; }
function fmtPlays(n){
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'k';
  return String(n);
}
function trackPlays(r,t){ return playCounts[playKey(r,t)] || 0; }
function albumPlays(r){ return releases[r].tracks.reduce((s,_,t) => s + trackPlays(r,t), 0); }
function totalPlays(){ return releases.reduce((s,_,r) => s + albumPlays(r), 0); }

function loadCounts(){
  loadLocalCounts();
  if (COUNTER_API){
    fetch(COUNTER_API + '/counts', {mode:'cors', cache:'no-store'})
      .then(r => { if(!r.ok) throw new Error('status '+r.status); return r.json(); })
      .then(d => {
        playCounts = d || {};
        saveLocalCounts();
        refreshPlayUI();
      })
      .catch(err => { console.warn('Worker fetch failed:', err); });
  }
}
function loadLocalCounts(){
  try { playCounts = JSON.parse(localStorage.getItem('al_plays') || '{}'); } catch(e){ playCounts = {}; }
  refreshPlayUI();
}
function saveLocalCounts(){
  try { localStorage.setItem('al_plays', JSON.stringify(playCounts)); } catch(e){}
}

function recordPlay(relIdx, trackIdx){
  const key = playKey(relIdx, trackIdx);
  playCounts[key] = (playCounts[key] || 0) + 1;
  saveLocalCounts();
  refreshPlayUI();
  if (COUNTER_API){
    fetch(COUNTER_API + '/play?key=' + encodeURIComponent(key), { method: 'POST' })
      .then(r => r.json())
      .then(d => { if (d && typeof d.count === 'number'){ playCounts[key] = d.count; refreshPlayUI(); } })
      .catch(() => {});
  }
}

/* ---------- playback ---------- */
function playTrack(relIdx, trackIdx){
  const rel = releases[relIdx];
  const track = rel.tracks[trackIdx];
  currentTrack = { relIdx, trackIdx };

  if (!track.src) {
    nowPlaying.innerHTML = `<strong>${track.title}</strong> -- no audio file linked yet. Add a "src" path in the code to enable playback.`;
    isPlaying = false;
    updatePlayIcon();
    renderTracks();
    return;
  }

  audio.src = track.src;
  audio.play().then(() => {
    isPlaying = true;
    updatePlayIcon();
    recordPlay(relIdx, trackIdx);
  }).catch(() => {
    nowPlaying.innerHTML = `<strong>${track.title}</strong> -- couldn't play this file. Check the src path.`;
  });
  nowPlaying.innerHTML = `<strong>${track.title}</strong> -- ${rel.title}`;

function togglePlay(){
  if (currentTrack.relIdx === -1) {
    if (releases[activeIndex].tracks.length) playTrack(activeIndex, 0);
    return;
  }
  if (!audio.src) { playTrack(currentTrack.relIdx, currentTrack.trackIdx); return; }
  if (isPlaying){
    audio.pause();
    isPlaying = false;
  } else {
    audio.play().catch(()=>{});
    isPlaying = true;

  renderTracks();

function stepTrack(dir){
  if (currentTrack.relIdx === -1) return;
  const rel = releases[currentTrack.relIdx];
  let next = currentTrack.trackIdx + dir;
  if (next < 0) next = 0;
  if (next >= rel.tracks.length) next = rel.tracks.length - 1;
  playTrack(currentTrack.relIdx, next);

/* ---------- helpers ---------- */
function parseDuration(str){
  const p = str.split(':').map(Number);
  if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
  return p[0] * 60 + p[1];
}
function formatDuration(totalSecs){
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}
function formatTime(s){
  s = Math.floor(s || 0);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

  const rel = releases[currentTrack.relIdx];
  if (currentTrack.trackIdx < rel.tracks.length - 1) {
    stepTrack(1);

  if (!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();

  audio.currentTime = pct * audio.duration;
});

/* ---------- drag: covers attached to your hand ---------- */
let dragStartX = 0, dragStartPos = 0, lastX = 0, lastT = 0, pxVelocity = 0;
let coverStepPx = 260;

function getStepPx(){
  const w = flow.firstElementChild;
  const cw = w ? w.getBoundingClientRect().width : 260;
  return cw * 1.15;
}

function onDragStart(clientX){
  isDragging = true;
  targetPos = null;       // grabbing mid-glide takes over immediately
  velocity = 0;
  dragStartX = clientX;
  dragStartPos = flowPos;
  lastX = clientX;
  lastT = performance.now();
  pxVelocity = 0;
  coverStepPx = getStepPx();
  stage.classList.add('grabbing');
}

function onDragMove(clientX){
  if (!isDragging) return;
  const now = performance.now();
  const dt = now - lastT;
  if (dt > 0){
    pxVelocity = (clientX - lastX) / dt; // px per ms
    lastX = clientX;
    lastT = now;
  }
  const dx = clientX - dragStartX;
  // soft resistance past the ends instead of a hard stop
  let p = dragStartPos - dx / coverStepPx;
  if (p < 0) p = p * 0.3;
  if (p > MAX_IDX) p = MAX_IDX + (p - MAX_IDX) * 0.3;
  flowPos = p;
}

function onDragEnd(clientX){
  if (!isDragging) return;
  isDragging = false;
  stage.classList.remove('grabbing');

  flowPos = clampPos(flowPos);
  const totalMoved = Math.abs(clientX - dragStartX);
  if (totalMoved < 6){
    // simple tap -- click handler picks the exact cover
    targetPos = Math.round(flowPos);
    return;
  }
  // hand the release velocity to the physics loop (px/ms -> covers/frame)
  velocity = -(pxVelocity * 16.7) / coverStepPx;
  if (Math.abs(velocity) < 0.008){
    velocity = 0;
    targetPos = Math.round(flowPos);
  }
}

stage.addEventListener('mousedown', (e) => { e.preventDefault(); onDragStart(e.clientX); });
window.addEventListener('mousemove', (e) => { if (isDragging) onDragMove(e.clientX); });
window.addEventListener('mouseup', (e) => { if (isDragging) onDragEnd(e.clientX); });

stage.addEventListener('touchstart', (e) => onDragStart(e.touches[0].clientX), {passive:true});
stage.addEventListener('touchmove', (e) => { if (isDragging) onDragMove(e.touches[0].clientX); }, {passive:true});
stage.addEventListener('touchend', (e) => onDragEnd(e.changedTouches[0].clientX), {passive:true});

/* tap a specific cover to fly to it */
flow.addEventListener('click', (e) => {
  if (Math.abs(lastX - dragStartX) > 6) return;
  const hit = document.elementFromPoint(e.clientX, e.clientY);
  const wrap = hit ? hit.closest('.cover-wrap') : null;
  if (!wrap) return;
  targetPos = parseInt(wrap.dataset.index);
  velocity = 0;
});

/* trackpad / wheel: continuous, then settle */
let wheelSnapTimer = null;
stage.addEventListener('wheel', (e) => {
  if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) return;
  e.preventDefault();
  targetPos = null;
  velocity = 0;
  flowPos = clampPos(flowPos + e.deltaX / 220);
  clearTimeout(wheelSnapTimer);
  wheelSnapTimer = setTimeout(() => { targetPos = Math.round(flowPos); }, 120);
}, {passive:false});

/* keyboard */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft'){ velocity = 0; targetPos = Math.max(0, (targetPos ?? Math.round(flowPos)) - 1); }
  if (e.key === 'ArrowRight'){ velocity = 0; targetPos = Math.min(MAX_IDX, (targetPos ?? Math.round(flowPos)) + 1); }
  if (e.key === ' '){ e.preventDefault(); togglePlay(); }
});

window.addEventListener('resize', () => { coverStepPx = getStepPx(); layoutCoversAt(flowPos); });
window.addEventListener('orientationchange', () => { setTimeout(() => { coverStepPx = getStepPx(); layoutCoversAt(flowPos); }, 300); });

/* ---------- story modal ---------- */
const storyOverlay = document.getElementById('storyOverlay');
const storyAlbum = document.getElementById('storyAlbum');
const storyCover = document.getElementById('storyCover');
const storyBody = document.getElementById('storyBody');
const storyCloseBtn = document.getElementById('storyClose');
const albumStoryBtn = document.getElementById('albumStoryBtn');

function openStory(){
  const rel = releases[activeIndex];
  if (!rel.story) return;
  storyAlbum.textContent = rel.title;
  if (rel.cover){
    storyCover.style.backgroundImage = `url("${rel.cover}")`;
  } else {
    storyCover.style.backgroundImage = 'none';
    storyCover.style.background = `linear-gradient(155deg, ${rel.gradient[0]}, ${rel.gradient[1]})`;
  }
  storyBody.innerHTML = rel.story.split('\n').filter(l => l.trim()).map(p => `<p>${p}</p>`).join('');
  storyOverlay.classList.add('open');
  requestAnimationFrame(() => requestAnimationFrame(() => storyOverlay.classList.add('visible')));
}

function closeStory(){
  storyOverlay.classList.remove('visible');
  setTimeout(() => storyOverlay.classList.remove('open'), 300);
}

albumStoryBtn.addEventListener('click', openStory);
storyCloseBtn.addEventListener('click', closeStory);
storyOverlay.addEventListener('click', (e) => { if (e.target === storyOverlay) closeStory(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && storyOverlay.classList.contains('open')) closeStory(); });

/* ---------- fullscreen now-playing view ---------- */
const fsOverlay = document.getElementById('fsOverlay');
const fsBg = document.getElementById('fsBg');
const fsCover = document.getElementById('fsCover');
const fsTitle = document.getElementById('fsTitle');
const fsSub = document.getElementById('fsSub');
const fsClose = document.getElementById('fsClose');
const albumFullscreenBtn = document.getElementById('albumFullscreenBtn');
const fsPlayBtn = document.getElementById('fsPlayBtn');
const fsPlayIcon = document.getElementById('fsPlayIcon');
const fsPrevBtn = document.getElementById('fsPrevBtn');
const fsNextBtn = document.getElementById('fsNextBtn');
const fsProgressBar = document.getElementById('fsProgressBar');
const fsProgressFill = document.getElementById('fsProgressFill');
const fsCurTime = document.getElementById('fsCurTime');
const fsDurTime = document.getElementById('fsDurTime');

function nowPlayingRelIdx(){
  return currentTrack.relIdx !== -1 ? currentTrack.relIdx : activeIndex;
}
function nowPlayingTrackIdx(){
  return currentTrack.relIdx !== -1 ? currentTrack.trackIdx : 0;
}

function renderFullscreenNow(){
  const relIdx = nowPlayingRelIdx();
  const rel = releases[relIdx];
  const trackIdx = nowPlayingTrackIdx();
  const track = rel.tracks[trackIdx];

  if (rel.cover){
    fsBg.style.background = '';
    fsBg.style.backgroundImage = `url("${rel.cover}")`;
    fsCover.style.background = '';
    fsCover.style.backgroundImage = `url("${rel.cover}")`;
  } else {
    fsBg.style.backgroundImage = 'none';
    fsBg.style.background = `linear-gradient(155deg, ${rel.gradient[0]}, ${rel.gradient[1]})`;
    fsCover.style.backgroundImage = 'none';
    fsCover.style.background = `linear-gradient(155deg, ${rel.gradient[0]}, ${rel.gradient[1]})`;
  }
  fsTitle.textContent = track ? track.title : rel.title;
  fsSub.textContent = rel.title + (rel.year ? ' · ' + rel.year : '');
  fsPlayIcon.innerHTML = isPlaying ? ICON_PAUSE : ICON_PLAY;
}

function openFullscreen(){
  renderFullscreenNow();
  fsOverlay.classList.add('open');
  requestAnimationFrame(() => requestAnimationFrame(() => fsOverlay.classList.add('visible')));
}
function closeFullscreen(){
  fsOverlay.classList.remove('visible');
  setTimeout(() => fsOverlay.classList.remove('open'), 320);
}

albumFullscreenBtn.addEventListener('click', openFullscreen);
fsClose.addEventListener('click', closeFullscreen);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && fsOverlay.classList.contains('open')) closeFullscreen(); });

fsPlayBtn.addEventListener('click', () => { togglePlay(); renderFullscreenNow(); });
fsPrevBtn.addEventListener('click', () => stepTrack(-1));
fsNextBtn.addEventListener('click', () => stepTrack(1));
fsProgressBar.addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = fsProgressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

/* keep the fullscreen view's progress + art in sync with the audio element */
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  fsProgressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  fsCurTime.textContent = formatTime(audio.currentTime);
  fsDurTime.textContent = formatTime(audio.duration);
});
const _origPlayTrack = playTrack;
playTrack = function(relIdx, trackIdx){
  _origPlayTrack(relIdx, trackIdx);
  if (fsOverlay.classList.contains('open')) renderFullscreenNow();
};

/* second set of floating hearts for the fullscreen view */
(function spawnFsHearts(){
  const canvas = document.getElementById('fsHearts');
  const emojis = ['🤍','❤️','🩷','💜','💙','🩵','💚','💛','🧡','❤️','🤍','🤍','💗','💓','💞'];
  const sizes  = [14, 16, 18, 20, 22, 26, 28, 12];

  function spawnOne(){
    const el = document.createElement('span');
    el.className = 'heart';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const size = sizes[Math.floor(Math.random() * sizes.length)];
    el.style.fontSize = size + 'px';
    el.style.left = (Math.random() * 100) + '%';
    const dur = 7 + Math.random() * 10;
    const delay = Math.random() * -dur;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = delay + 's';
    el.style.setProperty('--dx', (Math.random() * 60 - 30) + 'px');
    canvas.appendChild(el);
    setTimeout(() => el.remove(), (dur + Math.abs(delay) + 2) * 1000);
  }

  for(let i = 0; i < 14; i++) spawnOne();
  setInterval(spawnOne, 1100);
})();

buildCovers();
releases.forEach((_, i) => computeAlbumColor(i));

flowPos = 0;
syncNearest();
// load counts after page is interactive so GitHub Pages doesn't block
setTimeout(loadCounts, 100);
requestAnimationFrame(tick);
