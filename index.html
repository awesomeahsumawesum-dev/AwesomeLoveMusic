<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Awesome Love -- Discography</title>
<style>
  :root{
    --bg-top:#131316;
    --bg-bottom:#040405;
    --chrome-hi:#f5f6f8;
    --chrome-mid:#c7c9cf;
    --chrome-lo:#8a8a90;
    --ink:#f2f2f4;
    --ink-dim:#9a9aa2;
    --accent:#3d7fe0;
    --panel: rgba(255,255,255,0.05);
    --panel-border: rgba(255,255,255,0.1);
  }
  *{box-sizing:border-box;}
  html,body{
    height:100%;
    margin:0;
    background: radial-gradient(ellipse at 50% -10%, var(--bg-top), var(--bg-bottom) 72%);
    color:var(--ink);
    font-family:-apple-system, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
  }
  #app{
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* ---------- TOP BAR ---------- */
  .topbar{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:10px 16px 6px;
    flex-shrink:0;
    z-index:30;
    height:54px;
  }

  .topbar .brand{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-dim);
    font-weight:600;
  }
  .topbar{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:14px 16px 6px;
    flex-shrink:0;
    position:relative;
    z-index:30;
  }


  /* ---------- COVER FLOW STAGE ---------- */
  .stage{
    position:relative;
    flex:1 1 auto;
    min-height:0;
    width:100%;
    perspective:1400px;
    perspective-origin:50% 40%;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    cursor:grab;
    touch-action:pan-y;
  }
  .stage.grabbing{ cursor:grabbing; }

  /* ambient room glow, tinted by the active album's artwork */
  .glow{
    position:absolute;
    inset:-12%;
    pointer-events:none;
    z-index:1;
    opacity:0;
    transition:opacity 1.1s ease;
  }
  @media (max-width: 600px){
    .glow{ opacity:0 !important; display:none; }
  }

  .flow{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    z-index:10;
  }
  .cover-wrap{
    position:absolute;
    top:50%;
    left:50%;
    width:min(34vw, 300px);
    height:min(34vw, 300px);
    transform-style:preserve-3d;
    cursor:pointer;
    will-change: transform;
  }
  @media (max-width: 600px){
    .cover-wrap{
      width: min(38vw, 160px);
      height: min(38vw, 160px);
    }
    .stage{
      perspective: 600px;
      perspective-origin: 50% 45%;
    }
    .track-panel{
      max-height: 96px;
    }
    .info .title{
      font-size: 16px;
    }
    .info .meta{
      font-size: 11px;
    }
  }
  .cover-art{
    position:absolute;
    inset:0;
    border-radius:3px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.6), 0 2px 0 rgba(255,255,255,0.05) inset;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cover-art::after{
    /* glossy diagonal sheen */
    content:"";
    position:absolute;
    top:0; left:-60%;
    width:45%; height:100%;
    background:linear-gradient(115deg, rgba(255,255,255,0.28), rgba(255,255,255,0) 55%);
    transform:skewX(-18deg);
    pointer-events:none;
  }
  .cover-monogram{
    font-size:15%;
    font-weight:700;
    color:rgba(255,255,255,0.85);
    letter-spacing:0.02em;
    text-shadow:0 2px 8px rgba(0,0,0,0.35);
    z-index:1;
  }
  .cover-reflection{
    position:absolute;
    top:100%;
    left:0; right:0;
    height:70%;
    transform:scaleY(-1);
    border-radius:3px;
    overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,0.34), transparent 68%);
            mask-image:linear-gradient(to bottom, rgba(0,0,0,0.34), transparent 68%);
    opacity:0.9;
  }

  /* ---------- INFO CARD ---------- */
  .info{
    text-align:center;
    padding:2px 20px 10px;
    flex-shrink:0;
    position:relative;
    z-index:20;
    transition:opacity 0.22s ease;
  }
  .info.content-fading{ opacity:0; }
  .info .title{
    font-size:clamp(18px,3vw,26px);
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .info .meta{
    margin-top:4px;
    font-size:13px;
    color:var(--ink-dim);
    letter-spacing:0.02em;
    opacity:1;
  }
  .info .meta span{ margin:0 6px; }

  /* ---------- TRACK PANEL ---------- */
  .track-panel{
    flex-shrink:0;
    max-height:96px;
    overflow-y:auto;
    background: var(--panel);
    border-top:1px solid var(--panel-border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding:6px 0 4px;
    position:relative;
    z-index:20;
    transition:opacity 0.22s ease;
  }
  .track-panel.content-fading{ opacity:0; }
  .track-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:9px 22px;
    cursor:pointer;
    border-bottom:1px solid rgba(255,255,255,0.045);
  }
  .track-row:hover{ background:rgba(255,255,255,0.04); }
  .track-row.playing{ background:rgba(61,127,224,0.14); }
  .track-num{
    width:20px;
    text-align:right;
    font-size:12px;
    color:var(--ink-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink:0;
  }
  .track-row.playing .track-num{ color:transparent; position:relative; }
  .track-row.playing .track-num::before{
    content:"♪";
    color:var(--accent);
    position:absolute; right:0;
  }
  .track-name{
    flex:1 1 auto;
    font-size:14.5px;
    font-weight:500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .track-row.playing .track-name{ color:var(--accent); }
  .track-len{
    font-size:12px;
    color:var(--ink-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink:0;
  }

  /* ---------- TRACK HEART (save/favorite) ---------- */
  .track-heart{
    flex-shrink:0;
    width:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0.4;
    transition: transform 0.15s ease, opacity 0.15s ease;
    line-height:1;
  }
  .track-heart img{
    width:15px;
    height:auto;
    display:block;
    filter:grayscale(1);
    transition: filter 0.2s ease;
  }
  .track-heart:hover{ opacity:0.85; transform:scale(1.2); }
  .track-heart.saved{ opacity:1; }
  .track-heart.saved img{ filter:none; }
  .track-heart.pulse{ animation: heartPulse 0.35s ease; }
  @keyframes heartPulse{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.45); }
    100%{ transform:scale(1); }
  }

  /* ---------- TRACK SHARE (per-song link) ---------- */
  .track-share{
    flex-shrink:0;
    width:20px;
    height:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0.4;
    color:var(--ink-dim);
    transition: transform 0.15s ease, opacity 0.15s ease, color 0.15s ease;
  }
  .track-share svg{ width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .track-share:hover{ opacity:0.95; transform:scale(1.18); }
  .track-share.copied{ opacity:1; color:var(--accent); transform:scale(1.18); }
  @media(max-width:420px){
    .track-plays{ display:none; }
  }

  /* ---------- SHARED-SONG HIGHLIGHT ---------- */
  .track-row.shared-highlight{
    animation: sharedGlow 3.4s ease;
    position:relative;
  }
  .track-row.shared-highlight::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:linear-gradient(90deg, #ff3b30, #ff9500, #ffcc00, #34c759, #32ade6, #5856d6, #ff2d55);
    background-size:300% 100%;
    mix-blend-mode:screen;
    animation: sharedGlowSweep 3.4s ease, bannerGradient 2.4s linear infinite;
  }
  @keyframes sharedGlow{
    0%{ background:rgba(61,127,224,0.4); }
    70%{ background:rgba(61,127,224,0.14); }
    100%{ background:transparent; }
  }
  @keyframes sharedGlowSweep{
    0%{ opacity:0; }
    12%{ opacity:0.55; }
    70%{ opacity:0.22; }
    100%{ opacity:0; }
  }

  /* ---------- SHARE TOAST ---------- */
  .share-toast{
    position:fixed;
    z-index:9999;
    pointer-events:none;
    background:rgba(20,20,24,0.94);
    border:1px solid rgba(255,255,255,0.14);
    color:var(--ink);
    font-size:12px;
    font-weight:600;
    letter-spacing:0.01em;
    padding:6px 12px;
    border-radius:20px;
    box-shadow:0 6px 18px rgba(0,0,0,0.45);
    opacity:0;
    transform:translate(-50%, -4px);
    transition:opacity 0.18s ease, transform 0.18s ease;
    white-space:nowrap;
  }
  .share-toast.visible{ opacity:1; transform:translate(-50%, -12px); }

  /* ---------- SHARE LINK POPOVER (no-permissions-needed fallback) ---------- */
  .share-popover{
    position:fixed;
    z-index:9999;
    width:260px;
    box-sizing:border-box;
    background:rgba(24,24,28,0.98);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:12px;
    padding:10px 12px 12px;
    box-shadow:0 12px 32px rgba(0,0,0,0.5);
    opacity:0;
    transform:translateY(-4px);
    transition:opacity 0.16s ease, transform 0.16s ease;
  }
  .share-popover.visible{ opacity:1; transform:translateY(0); }
  .share-popover-label{
    font-size:11px;
    color:var(--ink-dim);
    margin-bottom:6px;
    letter-spacing:0.02em;
  }
  .share-popover-input{
    width:100%;
    box-sizing:border-box;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:8px;
    color:var(--ink);
    font-size:12px;
    padding:7px 9px;
    outline:none;
  }
  .share-popover-input:focus{ border-color: rgba(61,127,224,0.6); }
  .share-popover-close{
    position:absolute;
    top:6px; right:8px;
    font-size:12px;
    color:var(--ink-dim);
    cursor:pointer;
    padding:2px 4px;
  }
  .share-popover-close:hover{ color:var(--ink); }

  /* ---------- HEART BURST (on save) ---------- */
  .burst-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9999;
    overflow:visible;
  }
  .burst-particle{
    position:fixed;
    left:0; top:0;
    pointer-events:none;
    will-change: transform, opacity;
    animation: burstFly var(--dur, 4s) cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .burst-heart{
    display:block;
    border:0;
  }
  .burst-spark{
    border-radius:50%;
    box-shadow: 0 0 8px 1px currentColor, 0 0 3px currentColor;
  }
  @keyframes burstFly{
    0%{ transform:translate(-50%,-50%) scale(0.3) rotate(0deg); opacity:1; }
    70%{ opacity:1; }
    100%{ transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1) rotate(var(--rot)); opacity:0; }
  }

  /* ---------- DRAG HEART TRAIL (subtle hearts while dragging the cover flow) ---------- */
  .trail-heart{
    position:fixed;
    left:0; top:0;
    width:10px;
    height:auto;
    display:block;
    pointer-events:none;
    z-index:9999;
    opacity:0.72;
    transform:translate(-50%,-50%) scale(1);
    animation: trailFade 0.85s ease-out forwards;
  }
  @keyframes trailFade{
    0%{ opacity:0.72; transform:translate(-50%,-50%) scale(1); }
    100%{ opacity:0; transform:translate(calc(-50% + var(--tx, 0px)), calc(-50% + var(--ty, -16px))) scale(0.4); }
  }

  /* ---------- HEART SHOWER (falls across the whole screen during the welcome celebration) ---------- */
  .shower-heart{
    position:fixed;
    top:-40px;
    display:block;
    pointer-events:none;
    z-index:9997;
    animation-name: heartShowerFall;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
  }
  @keyframes heartShowerFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    8%{ opacity:0.9; }
    88%{ opacity:0.9; }
    100%{ transform:translateY(112vh) rotate(var(--rot, 180deg)); opacity:0; }
  }

  /* ---------- OPENING FLASH (a quick bright curtain-rise moment) ---------- */
  .epic-flash{
    position:fixed;
    inset:0;
    z-index:10001;
    pointer-events:none;
    background: radial-gradient(circle at 50% 42%, rgba(255,255,255,0.9), rgba(255,220,180,0.5) 40%, transparent 75%);
    opacity:0;
    animation: epicFlash 0.7s ease-out forwards;
  }
  @keyframes epicFlash{
    0%{ opacity:0; }
    18%{ opacity:1; }
    100%{ opacity:0; }
  }

  /* ---------- STAGE PULSE (a soft impact on the cover flow itself) ---------- */
  .stage.epic-pulse{ animation: epicStagePulse 0.9s cubic-bezier(0.16,1,0.3,1); }
  @keyframes epicStagePulse{
    0%{ transform:scale(1); }
    30%{ transform:scale(1.035); }
    100%{ transform:scale(1); }
  }

  /* ---------- RAINBOW BURST FLASH (fires alongside the heart burst) ---------- */
  .rainbow-flash{
    position:fixed;
    left:0; top:0;
    width:150px;
    height:150px;
    margin-left:-75px;
    margin-top:-75px;
    border-radius:50%;
    pointer-events:none;
    z-index:9999;
    background: conic-gradient(from 0deg, #ff3b30, #ff9500, #ffcc00, #34c759, #32ade6, #5856d6, #ff2d55, #ff3b30);
    filter: blur(3px);
    mix-blend-mode: screen;
    opacity:0;
    transform: scale(0.15) rotate(0deg);
    animation: rainbowFlash var(--dur, 4s) cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes rainbowFlash{
    0%{ opacity:0; transform:scale(0.15) rotate(0deg); }
    14%{ opacity:0.8; }
    45%{ opacity:0.3; transform:scale(1) rotate(70deg); }
    100%{ opacity:0; transform:scale(1.4) rotate(150deg); }
  }

  /* ---------- SHARED-SONG BANNER (special reveal for whoever opens a shared link) ---------- */
  .shared-banner{
    position:fixed;
    top:16px;
    left:50%;
    z-index:10000;
    padding:10px 22px;
    border-radius:30px;
    background: linear-gradient(120deg, #ff3b30, #ff9500, #ffcc00, #34c759, #32ade6, #5856d6, #ff2d55, #ff3b30);
    background-size:300% 100%;
    animation: bannerGradient 6s linear infinite;
    color:#fff;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.01em;
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
    opacity:0;
    transform:translate(-50%, -14px);
    transition: transform 0.55s cubic-bezier(0.16,1,0.3,1), opacity 0.45s ease;
    pointer-events:none;
    white-space:nowrap;
    max-width:88vw;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .shared-banner.visible{ opacity:1; transform:translate(-50%, 0); }
  @keyframes bannerGradient{
    0%{ background-position:0% 50%; }
    100%{ background-position:300% 50%; }
  }
  @media(max-width:480px){
    .shared-banner{ font-size:12px; padding:8px 15px; top:max(10px, env(safe-area-inset-top)); }
  }

  /* ---------- WHOLE-SCREEN COLOR WASH for the shared-song reveal ---------- */
  .shared-wash{
    position:fixed;
    inset:0;
    z-index:9998;
    pointer-events:none;
    background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.16), rgba(120,90,255,0.10) 35%, transparent 70%);
    opacity:0;
    animation: sharedWash 4.4s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes sharedWash{
    0%{ opacity:0; }
    10%{ opacity:1; }
    55%{ opacity:0.5; }
    100%{ opacity:0; }
  }

  /* ---------- TRANSPORT BAR ---------- */
  .transport{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:16px;
    padding:12px 22px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(to bottom, #17171a, #0a0a0c);
    border-top:1px solid rgba(255,255,255,0.07);
    position:relative;
    z-index:30;
  }
  .now-playing{
    flex:1 1 auto;
    min-width:0;
    font-size:12.5px;
    color:var(--ink-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .now-playing strong{ color:var(--ink); font-weight:600; }
  .transport-controls{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .tbtn{
    width:34px; height:34px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.14);
    background:linear-gradient(to bottom, #3a3a3e, #232326);
    color:var(--chrome-hi);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 1px 0 rgba(255,255,255,0.08) inset, 0 2px 6px rgba(0,0,0,0.4);
  }
  .tbtn:hover{ filter:brightness(1.15); }
  .tbtn.play{
    width:40px; height:40px;
    background:linear-gradient(to bottom, var(--accent), #2a5db0);
    border-color: rgba(255,255,255,0.2);
  }
  .tbtn svg{ width:14px; height:14px; fill:currentColor; }
  .tbtn.play svg{ width:15px; height:15px; }

  .progress-wrap{
    display:none;
    align-items:center;
    gap:8px;
    flex:1 1 220px;
  }
  .progress-time{ font-size:11px; color:var(--ink-dim); font-variant-numeric: tabular-nums; width:34px; }
  .progress-bar{
    flex:1;
    height:4px;
    border-radius:2px;
    background:rgba(255,255,255,0.14);
    position:relative;
    cursor:pointer;
  }
  .progress-fill{
    position:absolute; top:0; left:0; bottom:0;
    width:0%;
    border-radius:2px;
    background:var(--accent);
  }

  @media (min-width: 720px){
    .progress-wrap{ display:flex; }
  }

  .donate-btn{
    font-size:11px;
    font-weight:600;
    color:rgba(255,255,255,0.72);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:5px 13px;
    cursor:pointer;
    text-decoration:none;
    letter-spacing:0.03em;
    transition:background 0.18s, color 0.18s;
    white-space:nowrap;
  }
  .donate-btn:hover{ background:rgba(255,255,255,0.15); color:#fff; }
  .story-btn{
    justify-self:start;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:600;
    color:rgba(255,255,255,0.72);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:5px 13px;
    cursor:pointer;
    text-decoration:none;
    letter-spacing:0.03em;
    transition:background 0.18s, color 0.18s;
    white-space:nowrap;
  }
  .story-btn:hover{ background:rgba(255,255,255,0.15); color:#fff; }

  .track-plays{
    font-size:11.5px;
    color:var(--accent);
    opacity:0.9;
    font-variant-numeric:tabular-nums;
    flex-shrink:0;
    min-width:36px;
    text-align:left;
    letter-spacing:0.02em;
  }
  .track-plays::before{
    content:"▶ ";
    font-size:7px;
    vertical-align:2px;
    opacity:0.6;
  }

  .support-wrap{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
  }
  .support-wrap .favorites-btn{
    font-size:10px;
    padding:4px 11px;
  }
  @media(max-width:500px){
    .support-wrap .favorites-btn{ font-size:9px; padding:3px 9px; }
  }

  .logo-wrap .brand-logo{
    height:30px !important;
    width:auto !important;
    max-height:30px !important;
    display:block;
    opacity:0.92;
  }
  .logo-wrap{
    justify-self:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
  }
  .total-plays-top{
    font-size:10px;
    color:var(--accent);
    font-weight:700;
    letter-spacing:0.07em;
    text-transform:uppercase;
    opacity:0.9;
    min-height:13px;
    text-align:center;
    cursor:pointer;
  }
  .total-plays-top.exact-reveal{
    color:transparent;
    background: linear-gradient(90deg, #ff3b30, #ff9500, #ffcc00, #34c759, #32ade6, #5856d6, #ff2d55, #ff3b30);
    background-size:300% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    animation: exactRevealFade 4s ease-in-out, exactRevealGradient 2s linear infinite;
  }
  @keyframes exactRevealFade{
    0%{ opacity:0; }

    story: `I Started This Album March 3rd of 2026, During which time I was deeply Sick, Completely and Totally unable to truly calm down and Sleep. I had not been playing for months as I had been too Sick.

I Played for Hours and Hours — in fact the Album is 16 Hours Long!

I Am so Happy I am Healthy Today and Able to Continue as Awesome Love.

I Hope to The God of Love for Decades of Healthy Happy Comfortable Awesome Life.

    story: `This Album Was Made When I Was Struggling My Most With Losing My Mom And Her Death.

I Needed Something to Calm Me Down.

This Is When I Created Music That is Really What I Love To Think of As Perfect Background Music. Because I Don't Think This Album Gets Old Easily — Listening To It quietly While You Do Life's Daily Tasks.

Originally It Sounded A lot Like Awesome, With A Heavy Focus On Singing The First Five Notes in a Major Scale. I Decided To Simplify It After I Made Glorious, With A lot Of Rest Between Me Singing, and Made It Focus on What I Call The Heart Notes. The Heart Notes are C E G in C Major =-)

With My Focus on a Uniquely Longful Restful Album I Carried on Creating Until I Eventually Discovered My Love of Pads Alone.

After Discovering My Love of Pads and Rest and my Desire to Sing Exclusively the Heart Notes, I Went On To Craft This Album from August 2022 to its Release in September 2024.

Particularly Focusing Around A Major, A Favorite Feeling Key =-) and G Major, another Favorite Feeling Key, and C Major, probably the Friendliest Key — Because it's the First One We Musicians Learn, And The Piano Is Designed around it, and it's Awesome haha =-)

With the album Phenomenal I did 100's and 100's of takes of each part of a word — Ah's and O's included =-) Listening Closely to My Voice Isolated Alone before moving on, building the entire song piece by piece.

I'm really really really proud of that, and the Sound of the Album is Worth The Effort.

I Was in a Really Really Bad Place Health Wise in December of 2025 and This Album Made Me Want To Live. Therefore I am grateful and Believe this Music Saved My Life.

During the Early Creation of this Album I Learned of 432hz — Tuning the A Below Middle C from the 440hz computer software standard to 432. I initially tried it for one song, then started composing and creating in 432hz. I am so Glad I Found and was Told of this Beautiful Sacred Truth of Earth and Music's important Connection, and how it can make me feel Physically Healthier to Sing, Create and Listen to 432HZ Music — Relaxing me and Allowing me to Heal from my Pain Easier than the conflicting and eerie Hollow feeling I get from the standard "enforced" tuning. I Love 432.

I Love Phenomenal — it is the Most Effort I Ever Did for a Single Thing I Created in My Entire Life.

Thank the God of Love for 432, the Major Scale, the invention of the Piano, and my Love of Those Things.

♥️`,

    year: "2022",
    type: "Album",

    cover: "https://pub-1a1abd4855a54958bf82eeb2e0f254e6.r2.dev/Covers/Awesome-Cover.jpg",
    story: `I Love this Album so much I went to get tattooed in the University District of Washington, and the tattoo artist refused to do my Original Desire of a Neck tattoo and insisted I get it on My Hand First — That's Why I got It On Me Two Times =-) I Believe I Would Have Gone With Just The Neck Originally =-)

I'm Very Glad To Tell You The Album Artwork is Handwritten and Manually Edited by Me with Photoshop to Make it Look How I Envisioned It =-)

In The Year Two Thousand And Twenty Two, This Album got Made during a profoundly stressful Period of my Life where I Desired a Change. A Change For Better. A Change From Being Sad and Bummed I Lost my Beautiful Mother to Dementia — and really, in a real way, my Father Along With It, because He Forgot to Care for Me. I Also was in a Very Awful Relationship — Awful because Neither of Us Loved One Another and We Were Incredibly Lonely, and That's Why We Were Together =-(

I Needed a Change. I Wanted a Change. I Made a Change.

That's Why I Created the Album Awesome and Tattooed My Art On My Throat and Have Now Legally Changed My Name To Awesome Love.

I Have Had A Hard Life In A Lot Of Ways So Far, And I Needed Something To Carry Me Through The Hard Times And Help Make It Awesome.

I Gotta Really Thank A Human Being Named Jonathan, the Engineering Side of Halfway Sound, that I Paid around 1000 Dollars to Mix the Entire Album =-) I Really Love How Encouraging and Positive He Was To Me. Thank You Jonathan Toscano ♥️

I Also Emphasize: LIFE ITSELF IS AWESOME, Despite Mine Having a Hard Beginning, Then Losing Mom for Fifteen Years and Being Thrown Into The World Completely Alone at 18. That is the Real Reason why You Ought To Support Me, Those With Money, so I Can Survive More Comfortably Without Serious Cost to my Body and Well Being.

From December of 2021 to May of 2022 I Produced Everything with my Keyboard. It Was an 88 Key Early 2000's Model of a Keyboard. Super Super Heavy — I Hauled It Around While I Lived in Air BnB's from Early March of 2022 to May 25th of 2022, After Leaving an Apartment in University District, Washington, Where I Struggled Heavily With Zero Real Family Support.

I Released This Album the Same Week I Moved into a New Apartment I Loved Deeply In Roosevelt, Washington, on or around May 25th of 2022.

I Went on to Sing It At a Few Dozen Open Mics Around The North Seattle Area and a Few Times on Capitol Hill. Really Enjoying The Dock Open Mic By Lana Sparks In Fremont. I Also Really Enjoyed — and Probably Loved the Most — the Seattle Records Open Mic in University District. The Reason why I Loved It is because everyone was Really Extra Kind and Lovely To me there, and there's also so many other Awesome Artists! I Really Loved the Cafe Racer Too — Everyone Was Really Really Nice To Me There too.

The Music is Me Doing Whatever Feels Good Musically, and it happens to be Major scale — particularly the first Five Notes =-) I Love What I Created, it's so Fun to Sing Along with. I remember fondly riding a Lime Bike around the GreenLake U District Area — there is an Awesome Memory of me singing the album a whole bunch, Pedaling up to the Woodland Park Zoo. I Love Singing. I Found Singing is a good way to stay Healthy too.

const HEART_COLOR_IMG_SRCS = [HEART_COLOR_ORANGE, HEART_COLOR_YELLOW, HEART_COLOR_GREEN, HEART_COLOR_BLUE, HEART_COLOR_PURPLE, HEART_COLOR_RED];

/* ---------- build ---------- */
function buildCovers(){
  flow.innerHTML = '';
  releases.forEach((rel, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'cover-wrap';
    wrap.dataset.index = i;

    const art = document.createElement('div');
    art.className = 'cover-art';
    if (rel.cover) {
      art.style.backgroundImage = `url("${rel.cover}")`;
      art.style.backgroundSize = 'cover';
      art.style.backgroundPosition = 'center';
    } else {
      art.style.background = `linear-gradient(155deg, ${rel.gradient[0]}, ${rel.gradient[1]})`;
      const mono = document.createElement('div');
      mono.className = 'cover-monogram';
      mono.textContent = rel.monogram || (i+1);
      art.appendChild(mono);
    }

    const reflection = art.cloneNode(true);
    reflection.className = 'cover-reflection';

    wrap.appendChild(art);
    wrap.appendChild(reflection);
    flow.appendChild(wrap);
  });
}

/* ---------- album color extraction (for the room glow) ---------- */
function computeAlbumColor(i){
  const rel = releases[i];
  if (!rel.cover){
    albumColors[i] = rel.gradient[0];
    if (i === activeIndex) setGlow(albumColors[i]);
    return;
  }
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const c = document.createElement('canvas');
      c.width = 12; c.height = 12;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 12, 12);
      const d = ctx.getImageData(0, 0, 12, 12).data;
      let r=0,g=0,b=0,n=0;
      for (let p = 0; p < d.length; p += 4){
        r += d[p]; g += d[p+1]; b += d[p+2]; n++;
      }
      r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n);
      albumColors[i] = `rgb(${r},${g},${b})`;
    } catch(e) {
      albumColors[i] = rel.gradient ? rel.gradient[0] : '#3d7fe0';
    }
    if (i === activeIndex) setGlow(albumColors[i]);
  };
  img.onerror = () => {
    albumColors[i] = rel.gradient ? rel.gradient[0] : '#3d7fe0';
    if (i === activeIndex) setGlow(albumColors[i]);
  };
  img.src = rel.cover;
}

/* ---------- room glow (two layers crossfade) ---------- */
let glowFlip = false;
function toGlowRgba(color, a){
  if (color.startsWith('rgb(')) return color.replace('rgb(', 'rgba(').replace(')', `,${a})`);
  // hex
  const h = color.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function setGlow(color){
  if (!color) return;
  const show = glowFlip ? glowB : glowA;
  const hide = glowFlip ? glowA : glowB;
  glowFlip = !glowFlip;
  show.style.background =
    `radial-gradient(ellipse 62% 52% at 50% 42%, ${toGlowRgba(color, 0.30)}, ${toGlowRgba(color, 0.10)} 45%, transparent 72%)`;
  show.style.opacity = 1;
  hide.style.opacity = 0;
}

/* ---------- layout (runs every frame) ---------- */
function layoutCoversAt(pos){
  const wraps = flow.children;
  for (let i = 0; i < wraps.length; i++){
    const wrap = wraps[i];
    const offset = i - pos;
    const abs = Math.abs(offset);
    const dir = offset === 0 ? 0 : (offset > 0 ? 1 : -1);
    const t = Math.min(abs, 1); // 0 at center -> 1 at first neighbor

    const ry = -dir * t * 42;
    const scale = 1 - 0.18 * t;
    const tz = -90 * t - 40 * Math.max(abs - 1, 0);
    const opacity = abs > 6 ? 0 : 1 - 0.05 * Math.max(abs - 1, 0);
    // Use vw-based spread so positioning is always relative to screen width,
    // not cover size -- this fixes mobile portrait AND landscape
    const vw = window.innerWidth / 100;
    const coverW = flow.firstElementChild ? flow.firstElementChild.getBoundingClientRect().width : 200;
    // convert vw spread to percentage of cover width (since transform uses %)
    const spreadVW = window.innerWidth < 600 ? 22 : 40; // vw units
    const extraVW  = window.innerWidth < 600 ? 8  : 14;
    const spreadPct = (spreadVW * vw) / coverW * 100;
    const extraPct  = (extraVW  * vw) / coverW * 100;
    const pxOffset = dir * (spreadPct * t + extraPct * Math.max(abs - 1, 0));

    wrap.style.transform =
      `translate(-50%,-50%) translateX(${pxOffset}%) translateZ(${tz}px) rotateY(${ry}deg) scale(${scale})`;
    wrap.style.zIndex = Math.round(200 - abs * 10);
    wrap.style.opacity = Math.max(0, opacity);
  }
}

/* ---------- rolodex click, tuned to A=432Hz ---------- */
let audioCtx = null;
function ensureAudioCtx(){
  if (!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(err){ return null; }
  }
  if (audioCtx.state === 'suspended'){ audioCtx.resume().catch(() => {}); }
  return audioCtx;
}
function playRolodexClick(){
  if (!audioCtx || audioCtx.state !== 'running') return;
  try {
    const now = audioCtx.currentTime;
    // A tuned to 432Hz (not the standard 440) -- matches Awesome Love's own tuning
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(432, now);
    osc.frequency.exponentialRampToValueAtTime(324, now + 0.045); // A down to E, a little "tock"
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.16, now + 0.006);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.1);
  } catch(err){ /* purely decorative -- fail silently */ }
}

/* ---------- nearest-cover content sync (crossfade) ---------- */
let fadeTimer = null;
function syncNearest(){
  const n = Math.max(0, Math.min(MAX_IDX, Math.round(flowPos)));
  if (n === activeIndex) return;
  const isFirstSync = (activeIndex === -1);
  activeIndex = n;
  setGlow(albumColors[n]);
  if (!isFirstSync) playRolodexClick();
  // moving the carousel always drops you back into normal album view
  if (showingFavorites){
    showingFavorites = false;
    favoritesBtn.classList.remove('active');
  }
  infoCard.classList.add('content-fading');
  trackPanel.classList.add('content-fading');
  clearTimeout(fadeTimer);
  fadeTimer = setTimeout(() => {
    renderInfo();
    renderTracks();
    infoCard.classList.remove('content-fading');
    trackPanel.classList.remove('content-fading');
  }, 170);
}

/* ---------- physics loop ---------- */
const SPRING = 0.14;
const FRICTION = 0.94;

function clampPos(p){ return Math.max(0, Math.min(MAX_IDX, p)); }

function tick(){
  if (!isDragging){
    if (targetPos !== null){
      const diff = targetPos - flowPos;
      flowPos += diff * SPRING;
      if (Math.abs(diff) < 0.002){
        flowPos = targetPos;
        targetPos = null;
      }
    } else if (Math.abs(velocity) > 0.0004){
      flowPos += velocity;
      velocity *= FRICTION;
      if (flowPos <= 0 || flowPos >= MAX_IDX){
        flowPos = clampPos(flowPos);
        velocity = 0;
        targetPos = Math.round(flowPos);
      } else if (Math.abs(velocity) < 0.006){
        velocity = 0;
        targetPos = Math.round(flowPos);
      }
    }
  }

  layoutCoversAt(flowPos);
  syncNearest();
  requestAnimationFrame(tick);
}

/* ---------- global play counters ---------- */
const COUNTER_API = "https://awesome-plays.awesomeahsum.workers.dev";

const totalPlaysEl = document.getElementById('totalPlays');
let playCounts = {};

function playKey(relIdx, trackIdx){ return releases[relIdx].title + '::' + releases[relIdx].tracks[trackIdx].title; }
function fmtPlays(n){
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'k';
  return String(n);
}
function trackPlays(r,t){ return playCounts[playKey(r,t)] || 0; }
function albumPlays(r){ return releases[r].tracks.reduce((s,_,t) => s + trackPlays(r,t), 0); }
function totalPlays(){ return releases.reduce((s,_,r) => s + albumPlays(r), 0); }

function loadCounts(){
  loadLocalCounts();
  if (COUNTER_API){
    fetch(COUNTER_API + '/counts', {mode:'cors', cache:'no-store'})
      .then(r => { if(!r.ok) throw new Error('status '+r.status); return r.json(); })
      .then(d => {
        playCounts = d || {};
        saveLocalCounts();
        refreshPlayUI();
      })
      .catch(err => { console.warn('Worker fetch failed:', err); });
  }
}
function loadLocalCounts(){
  try { playCounts = JSON.parse(localStorage.getItem('al_plays') || '{}'); } catch(e){ playCounts = {}; }
  refreshPlayUI();
}
function saveLocalCounts(){
  try { localStorage.setItem('al_plays', JSON.stringify(playCounts)); } catch(e){}
}

function recordPlay(relIdx, trackIdx){
  const key = playKey(relIdx, trackIdx);
  playCounts[key] = (playCounts[key] || 0) + 1;
  saveLocalCounts();
  refreshPlayUI();
  if (COUNTER_API){
    fetch(COUNTER_API + '/play?key=' + encodeURIComponent(key), { method: 'POST' })
      .then(r => r.json())
      .then(d => { if (d && typeof d.count === 'number'){ playCounts[key] = d.count; refreshPlayUI(); } })
      .catch(() => {});
  }
}

function refreshPlayUI(){
  if (showingFavorites) { renderFavorites(); } else { renderInfo(); renderTracks(); }
  const tp = document.getElementById('totalPlays');
  if (tp){ const t=totalPlays(); tp.textContent = t>0 ? fmtPlays(t)+' total plays' : ''; }

  if (totalPlaysEl) totalPlaysEl.textContent = fmtPlays(totalPlays()) + ' plays';
}

/* ---------- favorites (saved / loved songs) ---------- */

function favKey(relIdx, trackIdx){ return relIdx + '::' + trackIdx; }

function loadFavorites(){

function toggleFavorite(relIdx, trackIdx, heartEl){

/* ---------- heart burst animation (fires when a song is loved) ---------- */
let burstLayer = null;
const BURST_DUR = 4; // seconds -- how long each burst heart drifts before fading
function spawnHeartBurst(cx, cy, opts){
  opts = opts || {};
  if (!burstLayer){
    burstLayer = document.createElement('div');
    burstLayer.className = 'burst-layer';
    document.body.appendChild(burstLayer);
  }
  const COUNT = opts.count || 12;
  const minDist = opts.minDist != null ? opts.minDist : 90;
  const maxDist = opts.maxDist != null ? opts.maxDist : 240;
  const minSize = opts.minSize != null ? opts.minSize : 18;
  const maxSize = opts.maxSize != null ? opts.maxSize : 44;
  const dur = opts.dur || BURST_DUR;
  const imgSrcs = opts.imgSrcs || [HEART_IMG_SRC];
  for (let i = 0; i < COUNT; i++){
    const el = document.createElement('img');
    el.className = 'burst-particle burst-heart';
    el.src = imgSrcs[Math.floor(Math.random() * imgSrcs.length)];
    el.alt = '';
    const angle = (Math.PI * 2 * i) / COUNT + (Math.random() * 0.5 - 0.25);
    const dist = minDist + Math.random() * (maxDist - minDist);
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - dist * 0.15; // gentle upward float
    const size = minSize + Math.random() * (maxSize - minSize);
    const delay = Math.random() * 0.25; // slight stagger so the burst doesn't feel too uniform
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    el.style.width = size + 'px';
    el.style.height = 'auto';
    el.style.setProperty('--tx', tx + 'px');
    el.style.setProperty('--ty', ty + 'px');
    el.style.setProperty('--rot', (Math.random() * 140 - 70) + 'deg');
    el.style.setProperty('--dur', dur + 's');
    el.style.animationDelay = delay + 's';
    burstLayer.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay) * 1000 + 80);
  }
}

/* ---------- rainbow burst (fires alongside the heart burst) ---------- */
function spawnRainbowBurst(cx, cy, opts){
  opts = opts || {};
  if (!burstLayer){
    burstLayer = document.createElement('div');
    burstLayer.className = 'burst-layer';
    document.body.appendChild(burstLayer);
  }
  const dur = opts.dur || BURST_DUR;
  const flashSize = opts.flashSize || 150;

  // colorful flash ring that blooms and dissolves over the burst
  const flash = document.createElement('div');
  flash.className = 'rainbow-flash';
  flash.style.left = cx + 'px';
  flash.style.top = cy + 'px';
  flash.style.width = flashSize + 'px';
  flash.style.height = flashSize + 'px';
  flash.style.marginLeft = (-flashSize / 2) + 'px';
  flash.style.marginTop = (-flashSize / 2) + 'px';
  flash.style.setProperty('--dur', dur + 's');
  burstLayer.appendChild(flash);
  setTimeout(() => flash.remove(), dur * 1000 + 80);

  // rainbow-hued sparks radiating outward alongside the hearts
  const COUNT = opts.count || 16;
  const minDist = opts.minDist != null ? opts.minDist : 80;
  const maxDist = opts.maxDist != null ? opts.maxDist : 230;
  const minSize = opts.minSize != null ? opts.minSize : 5;
  const maxSize = opts.maxSize != null ? opts.maxSize : 12;
  for (let i = 0; i < COUNT; i++){
    const el = document.createElement('div');
    el.className = 'burst-particle burst-spark';
    const hue = Math.round((360 / COUNT) * i);
    el.style.background = 'hsl(' + hue + ', 88%, 60%)';
    el.style.color = 'hsl(' + hue + ', 88%, 60%)'; // drives the glow via currentColor
    const angle = (Math.PI * 2 * i) / COUNT + (Math.random() * 0.3 - 0.15);
    const dist = minDist + Math.random() * (maxDist - minDist);
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - dist * 0.1;
    const size = minSize + Math.random() * (maxSize - minSize);
    const delay = Math.random() * 0.25;
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.setProperty('--tx', tx + 'px');
    el.style.setProperty('--ty', ty + 'px');
    el.style.setProperty('--rot', (Math.random() * 180 - 90) + 'deg');
    el.style.setProperty('--dur', dur + 's');
    el.style.animationDelay = delay + 's';
    burstLayer.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay) * 1000 + 80);
  }
}

/* ---------- share links (per song) ---------- */
function buildShareUrl(relIdx, trackIdx){
  const base = location.origin + location.pathname;
  return base + '#song=' + relIdx + '-' + trackIdx;
}

function shareTrack(relIdx, trackIdx, btnEl, evt){
  if (evt) evt.stopPropagation();
  const rel = releases[relIdx];
  const track = rel.tracks[trackIdx];
  const url = buildShareUrl(relIdx, trackIdx);
  const shareData = { title: track.title + ' — Awesome Love', text: track.title + ' from "' + rel.title + '" by Awesome Love', url };

  if (navigator.share){
    try {
      const p = navigator.share(shareData);
      if (p && typeof p.catch === 'function'){
        p.catch(() => copyLinkWithFallback(url, btnEl));
      }
      return;
    } catch (err){
      // some browsers throw synchronously (e.g. no user-gesture / unsupported) -- fall through
    }
  }
  copyLinkWithFallback(url, btnEl);
}

function copyLinkWithFallback(url, btnEl){
  const onCopied = () => {
    if (btnEl){
      btnEl.classList.add('copied');
      setTimeout(() => btnEl.classList.remove('copied'), 900);
    }
    showShareToast(btnEl, 'Link copied ♥');
  };

  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(onCopied).catch(() => legacyCopy(url, onCopied, btnEl));
  } else {
    legacyCopy(url, onCopied, btnEl);
  }
}

/* older execCommand copy -- works in most embedded/sandboxed contexts where the
   modern Clipboard API is blocked by permissions policy */
function legacyCopy(url, onCopied, btnEl){
  try {
    const ta = document.createElement('textarea');
    ta.value = url;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.top = '-1000px';
    ta.style.left = '-1000px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, url.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok){ onCopied(); return; }
  } catch (err){ /* fall through to the popover */ }
  openShareLinkPopover(btnEl, url);
}

/* last-resort fallback that needs zero special permissions: a little popover
   with the link pre-selected so the person can just hit copy themselves */
let sharePopoverEl = null;
function openShareLinkPopover(anchorEl, url){
  closeSharePopover();
  const pop = document.createElement('div');
  pop.className = 'share-popover';
  pop.innerHTML = `
    <div class="share-popover-label">Copy this link</div>
    <input class="share-popover-input" type="text" readonly>
    <div class="share-popover-close" title="Close">✕</div>
  `;
  document.body.appendChild(pop);

  const input = pop.querySelector('.share-popover-input');
  input.value = url;

  const anchorRect = anchorEl ? anchorEl.getBoundingClientRect() : { left: window.innerWidth/2, bottom: 80, width: 0 };
  const popW = 260;
  let left = anchorRect.left + anchorRect.width / 2 - popW / 2;
  left = Math.max(10, Math.min(window.innerWidth - popW - 10, left));
  let top = anchorRect.bottom + 8;
  if (top + 70 > window.innerHeight) top = Math.max(10, anchorRect.top - 78);
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';

  requestAnimationFrame(() => pop.classList.add('visible'));
  setTimeout(() => { input.focus(); input.select(); }, 60);
  input.addEventListener('click', () => input.select());
  pop.querySelector('.share-popover-close').addEventListener('click', (e) => { e.stopPropagation(); closeSharePopover(); });

  sharePopoverEl = pop;
  setTimeout(() => document.addEventListener('click', outsideSharePopoverClick), 0);
}
function outsideSharePopoverClick(e){
  if (sharePopoverEl && !sharePopoverEl.contains(e.target)) closeSharePopover();
}
function closeSharePopover(){
  if (sharePopoverEl){
    sharePopoverEl.remove();
    sharePopoverEl = null;
    document.removeEventListener('click', outsideSharePopoverClick);
  }
}

let shareToastEl = null;
let shareToastTimer = null;
function showShareToast(anchorEl, text){
  if (!shareToastEl){
    shareToastEl = document.createElement('div');

  shareToastEl.style.left = (r.left + r.width / 2) + 'px';
  shareToastEl.style.top = r.top + 'px';

  shareToastTimer = setTimeout(() => shareToastEl.classList.remove('visible'), 1300);
}

/* ---------- playback ---------- */
function guessImageMime(url){
  const u = url.toLowerCase();
  if (u.endsWith('.png')) return 'image/png';
  if (u.endsWith('.webp')) return 'image/webp';
  return 'image/jpeg';
}

function updateMediaSessionMetadata(rel, track){
  if (!('mediaSession' in navigator)) return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: track.title,
      artist: 'Awesome Love',
      album: rel.title,
      artwork: rel.cover ? [
        { src: rel.cover, sizes: '512x512', type: guessImageMime(rel.cover) },
        { src: rel.cover, sizes: '256x256', type: guessImageMime(rel.cover) },
        { src: rel.cover, sizes: '96x96', type: guessImageMime(rel.cover) }
      ] : []
    });
  } catch(err){ /* lockscreen metadata is a nice-to-have, never block playback on it */ }
}

function playTrack(relIdx, trackIdx, onResult){
  const rel = releases[relIdx];
  const track = rel.tracks[trackIdx];
  currentTrack = { relIdx, trackIdx };
  updateMediaSessionMetadata(rel, track);

  if (!track.src) {
    nowPlaying.innerHTML = `<strong>${track.title}</strong> -- no audio file linked yet. Add a "src" path in the code to enable playback.`;
    isPlaying = false;
    updatePlayIcon();
    if (showingFavorites) renderFavorites(); else renderTracks();
    if (onResult) onResult(false);
    return;
  }

  audio.src = track.src;
  audio.play().then(() => {
    isPlaying = true;
    updatePlayIcon();
    recordPlay(relIdx, trackIdx);
    if (onResult) onResult(true);
  }).catch((err) => {
    isPlaying = false;
    updatePlayIcon();
    // a NotAllowedError here just means the browser blocked autoplay without
    // a direct tap -- that's not a broken file, so don't show a scary message
    if (!err || err.name !== 'NotAllowedError'){
      nowPlaying.innerHTML = `<strong>${track.title}</strong> -- couldn't play this file. Check the src path.`;
    }
    if (onResult) onResult(false);
  });
  nowPlaying.innerHTML = `<strong>${track.title}</strong> -- ${rel.title}`;
}

function togglePlay(){
  if (currentTrack.relIdx === -1) {
    if (releases[activeIndex].tracks.length) playTrack(activeIndex, 0);
    return;
  }
  if (!audio.src) { playTrack(currentTrack.relIdx, currentTrack.trackIdx); return; }
  if (isPlaying){
    audio.pause();
    isPlaying = false;
  } else {
    audio.play().catch(()=>{});
    isPlaying = true;
  }
  updatePlayIcon();
  if (showingFavorites) renderFavorites(); else renderTracks();
}

function updatePlayIcon(){
  playIcon.innerHTML = isPlaying ? ICON_PAUSE : ICON_PLAY;
  if (typeof fsPlayIcon !== 'undefined' && fsPlayIcon) fsPlayIcon.innerHTML = isPlaying ? ICON_PAUSE : ICON_PLAY;
}

function stepTrack(dir){
  if (currentTrack.relIdx === -1) return;
  const rel = releases[currentTrack.relIdx];
  let next = currentTrack.trackIdx + dir;
  if (next < 0) next = 0;
  if (next >= rel.tracks.length) next = rel.tracks.length - 1;
  playTrack(currentTrack.relIdx, next);
}

/* ---------- helpers ---------- */
function parseDuration(str){
  const p = str.split(':').map(Number);
  if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
  return p[0] * 60 + p[1];
}
function formatDuration(totalSecs){
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}
function formatTime(s){
  s = Math.floor(s || 0);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

/* ---------- transport events ---------- */
playBtn.addEventListener('click', togglePlay);
document.getElementById('nextBtn').addEventListener('click', () => stepTrack(1));
document.getElementById('prevBtn').addEventListener('click', () => stepTrack(-1));

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  curTimeEl.textContent = formatTime(audio.currentTime);
  durTimeEl.textContent = formatTime(audio.duration);
  if ('mediaSession' in navigator && navigator.mediaSession.setPositionState){
    try {
      navigator.mediaSession.setPositionState({
        duration: audio.duration,
        playbackRate: audio.playbackRate,
        position: audio.currentTime

});

/* ---------- drag: covers attached to your hand ---------- */
let dragStartX = 0, dragStartPos = 0, lastX = 0, lastT = 0, pxVelocity = 0;
let coverStepPx = 260;

function getStepPx(){
  const w = flow.firstElementChild;
  const cw = w ? w.getBoundingClientRect().width : 260;
  return cw * 1.15;
}

function onDragStart(clientX){
  ensureAudioCtx();
  isDragging = true;
  targetPos = null;       // grabbing mid-glide takes over immediately
  velocity = 0;
  dragStartX = clientX;
  dragStartPos = flowPos;
  lastX = clientX;
  lastT = performance.now();
  pxVelocity = 0;
  coverStepPx = getStepPx();
  stage.classList.add('grabbing');
}

function onDragMove(clientX){
  if (!isDragging) return;
  const now = performance.now();
  const dt = now - lastT;
  if (dt > 0){
    pxVelocity = (clientX - lastX) / dt; // px per ms
    lastX = clientX;
    lastT = now;
  }
  const dx = clientX - dragStartX;
  // soft resistance past the ends instead of a hard stop
  let p = dragStartPos - dx / coverStepPx;
  if (p < 0) p = p * 0.3;
  if (p > MAX_IDX) p = MAX_IDX + (p - MAX_IDX) * 0.3;
  flowPos = p;
}

function onDragEnd(clientX){
  if (!isDragging) return;
  isDragging = false;
  stage.classList.remove('grabbing');

  flowPos = clampPos(flowPos);
  const totalMoved = Math.abs(clientX - dragStartX);
  if (totalMoved < 6){
    // simple tap -- click handler picks the exact cover
    targetPos = Math.round(flowPos);
    return;
  }
  // hand the release velocity to the physics loop (px/ms -> covers/frame)
  velocity = -(pxVelocity * 16.7) / coverStepPx;
  if (Math.abs(velocity) < 0.008){
    velocity = 0;
    targetPos = Math.round(flowPos);
  }
}

/* ---------- subtle heart trail while dragging the cover flow ---------- */
let lastTrailX = 0, lastTrailY = 0, trailInited = false;
function maybeSpawnTrailHeart(x, y){
  if (!trailInited){
    lastTrailX = x; lastTrailY = y; trailInited = true;
    spawnTrailHeart(x, y); // instant feedback right on press, not just after moving
    return;
  }
  const dist = Math.hypot(x - lastTrailX, y - lastTrailY);
  if (dist < 8) return; // throttle by distance so it stays a trail, not a smear
  lastTrailX = x; lastTrailY = y;
  spawnTrailHeart(x, y);
}

/* ---------- draggable progress bar scrubbing, with a heart trail along the thumb ---------- */
function setupScrubbing(barEl, fillEl){
  let scrubbing = false;

  function seekTo(clientX){
    if (!audio.duration) return;
    const rect = barEl.getBoundingClientRect();
    let pct = (clientX - rect.left) / rect.width;
    pct = Math.max(0, Math.min(1, pct));
    audio.currentTime = pct * audio.duration;
    fillEl.style.width = (pct * 100) + '%';
  }
  function onDown(clientX, clientY){
    ensureAudioCtx();
    scrubbing = true;
    trailInited = false;
    seekTo(clientX);
    maybeSpawnTrailHeart(clientX, clientY);
  }
  function onMove(clientX, clientY){
    if (!scrubbing) return;
    seekTo(clientX);
    maybeSpawnTrailHeart(clientX, clientY);
  }
  function onUp(){
    scrubbing = false;
  }

  barEl.addEventListener('mousedown', (e) => { e.preventDefault(); onDown(e.clientX, e.clientY); });
  window.addEventListener('mousemove', (e) => { if (scrubbing) onMove(e.clientX, e.clientY); });
  window.addEventListener('mouseup', () => onUp());

  barEl.addEventListener('touchstart', (e) => { onDown(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
  barEl.addEventListener('touchmove', (e) => { if (scrubbing) onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
  barEl.addEventListener('touchend', () => onUp(), {passive:true});
}

    { x: W * 0.14, y: H * 0.78 },
    { x: W * 0.86, y: H * 0.78 }
  ];

  if (isReturning){
    // quicker build, smaller finale
    corners.slice(0, 2).forEach((pt, i) => setTimeout(() => burstAt(pt.x, pt.y, 1), i * 500));
    setTimeout(() => burstAt(W / 2, H * 0.42, 1.5), 1500); // finale
  } else {
    // four corners firing in turn, then one big finale from dead center
    corners.forEach((pt, i) => setTimeout(() => burstAt(pt.x, pt.y, 1), 300 + i * 550));
    setTimeout(() => burstAt(W * 0.3, H * 0.35, 1.15), 2900);
    setTimeout(() => burstAt(W * 0.7, H * 0.5, 1.15), 3500);
    setTimeout(() => burstAt(W / 2, H * 0.4, 1.9), 4700); // the finale
  }
}

(function checkFirstVisit(){
  // a shared song link already has its own special reveal moment --
  // don't stack a second celebration on top of it
  if (/^#song=\d+-\d+$/.test(location.hash)) return;

  let hasVisitedBefore = false;
  try { hasVisitedBefore = !!localStorage.getItem('al_visited_before'); } catch(err){}
  try { localStorage.setItem('al_visited_before', '1'); } catch(err){}

  setTimeout(() => triggerWelcomeCelebration(hasVisitedBefore), 500);
})();
</script>
