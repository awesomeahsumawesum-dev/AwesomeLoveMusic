<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Awesome Love — Discography</title>
<style>
  :root{
    --bg-top:#131316;
    --bg-bottom:#040405;
    --chrome-hi:#f5f6f8;
    --chrome-mid:#c7c9cf;
    --chrome-lo:#8a8a90;
    --ink:#f2f2f4;
    --ink-dim:#9a9aa2;
    --accent:#3d7fe0;
    --panel: rgba(255,255,255,0.05);
    --panel-border: rgba(255,255,255,0.1);
  }
  *{box-sizing:border-box;}
  html,body{
    height:100%;
    margin:0;
    background: radial-gradient(ellipse at 50% -10%, var(--bg-top), var(--bg-bottom) 72%);
    color:var(--ink);
    font-family:-apple-system, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
  }
  #app{
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* ---------- TOP BAR ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px 20px 6px;
    flex-shrink:0;
    position:relative;
    z-index:30;
  }
  .topbar .brand{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-dim);
    font-weight:600;
  }
  .topbar{ position:relative; }
  .topbar .brand-logo{
    height:34px;
    width:auto;
    display:block;
    opacity:0.92;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* ---------- COVER FLOW STAGE ---------- */
  .stage{
    position:relative;
    flex:1 1 auto;
    min-height:0;
    width:100%;
    perspective:1400px;
    perspective-origin:50% 40%;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    cursor:grab;
    touch-action:pan-y;
  }
  .stage.grabbing{ cursor:grabbing; }

  /* ambient room glow, tinted by the active album's artwork */
  .glow{
    position:absolute;
    inset:-12%;
    pointer-events:none;
    z-index:1;
    opacity:0;
    transition:opacity 1.1s ease;
  }
  @media (max-width: 600px){
    .glow{ opacity:0 !important; display:none; }
  }

  .flow{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    z-index:10;
  }
  .cover-wrap{
    position:absolute;
    top:50%;
    left:50%;
    width:min(34vw, 300px);
    height:min(34vw, 300px);
    transform-style:preserve-3d;
    cursor:pointer;
    will-change: transform;
  }
  @media (max-width: 600px){
    .cover-wrap{
      width: min(38vw, 160px);
      height: min(38vw, 160px);
    }
    .stage{
      perspective: 600px;
      perspective-origin: 50% 45%;
    }
    .track-panel{
      max-height: 28vh;
    }
    .info .title{
      font-size: 16px;
    }
    .info .meta{
      font-size: 11px;
    }
  }
  .cover-art{
    position:absolute;
    inset:0;
    border-radius:3px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.6), 0 2px 0 rgba(255,255,255,0.05) inset;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cover-art::after{
    /* glossy diagonal sheen */
    content:"";
    position:absolute;
    top:0; left:-60%;
    width:45%; height:100%;
    background:linear-gradient(115deg, rgba(255,255,255,0.28), rgba(255,255,255,0) 55%);
    transform:skewX(-18deg);
    pointer-events:none;
  }
  .cover-monogram{
    font-size:15%;
    font-weight:700;
    color:rgba(255,255,255,0.85);
    letter-spacing:0.02em;
    text-shadow:0 2px 8px rgba(0,0,0,0.35);
    z-index:1;
  }
  .cover-reflection{
    position:absolute;
    top:100%;
    left:0; right:0;
    height:70%;
    transform:scaleY(-1);
    border-radius:3px;
    overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,0.34), transparent 68%);
            mask-image:linear-gradient(to bottom, rgba(0,0,0,0.34), transparent 68%);
    opacity:0.9;
  }

  /* ---------- INFO CARD ---------- */
  .info{
    text-align:center;
    padding:2px 20px 10px;
    flex-shrink:0;
    position:relative;
    z-index:20;
    transition:opacity 0.22s ease;
  }
  .info.content-fading{ opacity:0; }
  .info .title{
    font-size:clamp(18px,3vw,26px);
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .info .meta{
    margin-top:4px;
    font-size:12.5px;
    color:var(--ink-dim);
    letter-spacing:0.02em;
  }
  .info .meta span{ margin:0 6px; }

  /* ---------- TRACK PANEL ---------- */
  .track-panel{
    flex-shrink:0;
    max-height:34vh;
    overflow-y:auto;
    background: var(--panel);
    border-top:1px solid var(--panel-border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding:6px 0 4px;
    position:relative;
    z-index:20;
    transition:opacity 0.22s ease;
  }
  .track-panel.content-fading{ opacity:0; }
  .track-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:9px 22px;
    cursor:pointer;
    border-bottom:1px solid rgba(255,255,255,0.045);
  }
  .track-row:hover{ background:rgba(255,255,255,0.04); }
  .track-row.playing{ background:rgba(61,127,224,0.14); }
  .track-num{
    width:20px;
    text-align:right;
    font-size:12px;
    color:var(--ink-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink:0;
  }
  .track-row.playing .track-num{ color:transparent; position:relative; }
  .track-row.playing .track-num::before{
    content:"♪";
    color:var(--accent);
    position:absolute; right:0;
  }
  .track-name{
    flex:1 1 auto;
    font-size:14.5px;
    font-weight:500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .track-row.playing .track-name{ color:var(--accent); }
  .track-len{
    font-size:12px;
    color:var(--ink-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink:0;
  }

  /* ---------- TRANSPORT BAR ---------- */
  .transport{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:16px;
    padding:12px 22px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(to bottom, #17171a, #0a0a0c);
    border-top:1px solid rgba(255,255,255,0.07);
    position:relative;
    z-index:30;
  }
  .now-playing{
    flex:1 1 auto;
    min-width:0;
    font-size:12.5px;
    color:var(--ink-dim);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .now-playing strong{ color:var(--ink); font-weight:600; }
  .transport-controls{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .tbtn{
    width:34px; height:34px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.14);
    background:linear-gradient(to bottom, #3a3a3e, #232326);
    color:var(--chrome-hi);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 1px 0 rgba(255,255,255,0.08) inset, 0 2px 6px rgba(0,0,0,0.4);
  }
  .tbtn:hover{ filter:brightness(1.15); }
  .tbtn.play{
    width:40px; height:40px;
    background:linear-gradient(to bottom, var(--accent), #2a5db0);
    border-color: rgba(255,255,255,0.2);
  }
  .tbtn svg{ width:14px; height:14px; fill:currentColor; }
  .tbtn.play svg{ width:15px; height:15px; }

  .progress-wrap{
    display:none;
    align-items:center;
    gap:8px;
    flex:1 1 220px;
  }
  .progress-time{ font-size:11px; color:var(--ink-dim); font-variant-numeric: tabular-nums; width:34px; }
  .progress-bar{
    flex:1;
    height:4px;
    border-radius:2px;
    background:rgba(255,255,255,0.14);
    position:relative;
    cursor:pointer;
  }
  .progress-fill{
    position:absolute; top:0; left:0; bottom:0;
    width:0%;
    border-radius:2px;
    background:var(--accent);
  }

  @media (min-width: 720px){
    .progress-wrap{ display:flex; }
  }

  .donate-btn{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    font-size:11.5px;
    font-weight:600;
    color:rgba(255,255,255,0.7);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:20px;
    padding:5px 13px;
    cursor:pointer;
    text-decoration:none;
    letter-spacing:0.03em;
    transition: background 0.18s ease, color 0.18s ease;
    white-space:nowrap;
  }
  .donate-btn:hover{
    background:rgba(255,255,255,0.15);
    color:rgba(255,255,255,0.95);
  }
  @media (max-width: 480px){ .donate-btn{ font-size:10px; padding:4px 10px; right:10px; } }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.15); border-radius:3px; }
</style>
</head>

/* ========================= APP LOGIC (no need to edit below) ========================= */
const flow = document.getElementById('flow');
const stage = document.getElementById('stage');
const glowA = document.getElementById('glowA');
const glowB = document.getElementById('glowB');
const infoCard = document.getElementById('infoCard');
const relTitle = document.getElementById('relTitle');
const relMeta = document.getElementById('relMeta');
const trackPanel = document.getElementById('trackPanel');
const nowPlaying = document.getElementById('nowPlaying');
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const progressFill = document.getElementById('progressFill');
const progressBar = document.getElementById('progressBar');
const curTimeEl = document.getElementById('curTime');
const durTimeEl = document.getElementById('durTime');

const MAX_IDX = releases.length - 1;

let activeIndex = -1;        // nearest cover; drives title/tracks/glow
let flowPos = 0;             // continuous position of the carousel
let velocity = 0;            // covers per frame, used for glide inertia
let targetPos = null;        // spring target when settling
let isDragging = false;
let currentTrack = { relIdx: -1, trackIdx: -1 };
let isPlaying = false;
const albumColors = new Array(releases.length).fill(null);

const ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
const ICON_PAUSE = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';

/* ---------- build ---------- */
function buildCovers(){
  flow.innerHTML = '';
  releases.forEach((rel, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'cover-wrap';
    wrap.dataset.index = i;

    const art = document.createElement('div');
    art.className = 'cover-art';
    if (rel.cover) {
      art.style.backgroundImage = `url("${rel.cover}")`;
      art.style.backgroundSize = 'cover';
      art.style.backgroundPosition = 'center';
    } else {
      art.style.background = `linear-gradient(155deg, ${rel.gradient[0]}, ${rel.gradient[1]})`;
      const mono = document.createElement('div');
      mono.className = 'cover-monogram';
      mono.textContent = rel.monogram || (i+1);
      art.appendChild(mono);
    }

    const reflection = art.cloneNode(true);
    reflection.className = 'cover-reflection';

    wrap.appendChild(art);
    wrap.appendChild(reflection);
    flow.appendChild(wrap);
  });
}

/* ---------- album color extraction (for the room glow) ---------- */
function computeAlbumColor(i){
  const rel = releases[i];
  if (!rel.cover){
    albumColors[i] = rel.gradient[0];
    if (i === activeIndex) setGlow(albumColors[i]);
    return;
  }
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const c = document.createElement('canvas');
      c.width = 12; c.height = 12;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 12, 12);
      const d = ctx.getImageData(0, 0, 12, 12).data;
      let r=0,g=0,b=0,n=0;
      for (let p = 0; p < d.length; p += 4){
        r += d[p]; g += d[p+1]; b += d[p+2]; n++;
      }
      r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n);
      albumColors[i] = `rgb(${r},${g},${b})`;
    } catch(e) {
      albumColors[i] = rel.gradient ? rel.gradient[0] : '#3d7fe0';
    }
    if (i === activeIndex) setGlow(albumColors[i]);
  };
  img.onerror = () => {
    albumColors[i] = rel.gradient ? rel.gradient[0] : '#3d7fe0';
    if (i === activeIndex) setGlow(albumColors[i]);
  };
  img.src = rel.cover;
}

/* ---------- room glow (two layers crossfade) ---------- */
let glowFlip = false;
function toGlowRgba(color, a){
  if (color.startsWith('rgb(')) return color.replace('rgb(', 'rgba(').replace(')', `,${a})`);
  // hex
  const h = color.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function setGlow(color){
  if (!color) return;
  const show = glowFlip ? glowB : glowA;
  const hide = glowFlip ? glowA : glowB;
  glowFlip = !glowFlip;
  show.style.background =
    `radial-gradient(ellipse 62% 52% at 50% 42%, ${toGlowRgba(color, 0.30)}, ${toGlowRgba(color, 0.10)} 45%, transparent 72%)`;
  show.style.opacity = 1;
  hide.style.opacity = 0;
}

/* ---------- layout (runs every frame) ---------- */
function layoutCoversAt(pos){
  const wraps = flow.children;
  for (let i = 0; i < wraps.length; i++){
    const wrap = wraps[i];
    const offset = i - pos;
    const abs = Math.abs(offset);
    const dir = offset === 0 ? 0 : (offset > 0 ? 1 : -1);
    const t = Math.min(abs, 1); // 0 at center -> 1 at first neighbor

    const ry = -dir * t * 42;
    const scale = 1 - 0.18 * t;
    const tz = -90 * t - 40 * Math.max(abs - 1, 0);
    const opacity = abs > 6 ? 0 : 1 - 0.05 * Math.max(abs - 1, 0);
    // Use vw-based spread so positioning is always relative to screen width,
    // not cover size — this fixes mobile portrait AND landscape
    const vw = window.innerWidth / 100;
    const coverW = flow.firstElementChild ? flow.firstElementChild.getBoundingClientRect().width : 200;
    // convert vw spread to percentage of cover width (since transform uses %)
    const spreadVW = window.innerWidth < 600 ? 22 : 40; // vw units
    const extraVW  = window.innerWidth < 600 ? 8  : 14;
    const spreadPct = (spreadVW * vw) / coverW * 100;
    const extraPct  = (extraVW  * vw) / coverW * 100;
    const pxOffset = dir * (spreadPct * t + extraPct * Math.max(abs - 1, 0));

    wrap.style.transform =
      `translate(-50%,-50%) translateX(${pxOffset}%) translateZ(${tz}px) rotateY(${ry}deg) scale(${scale})`;
    wrap.style.zIndex = Math.round(200 - abs * 10);
    wrap.style.opacity = Math.max(0, opacity);
  }
}

/* ---------- nearest-cover content sync (crossfade) ---------- */
let fadeTimer = null;
function syncNearest(){
  const n = Math.max(0, Math.min(MAX_IDX, Math.round(flowPos)));
  if (n === activeIndex) return;
  activeIndex = n;
  setGlow(albumColors[n]);
  infoCard.classList.add('content-fading');
  trackPanel.classList.add('content-fading');
  clearTimeout(fadeTimer);
  fadeTimer = setTimeout(() => {
    renderInfo();
    renderTracks();
    infoCard.classList.remove('content-fading');
    trackPanel.classList.remove('content-fading');
  }, 170);
}

/* ---------- physics loop ---------- */
const SPRING = 0.14;
const FRICTION = 0.94;

function clampPos(p){ return Math.max(0, Math.min(MAX_IDX, p)); }

function tick(){
  if (!isDragging){
    if (targetPos !== null){
      const diff = targetPos - flowPos;
      flowPos += diff * SPRING;
      if (Math.abs(diff) < 0.002){
        flowPos = targetPos;
        targetPos = null;
      }
    } else if (Math.abs(velocity) > 0.0004){
      flowPos += velocity;
      velocity *= FRICTION;
      if (flowPos <= 0 || flowPos >= MAX_IDX){
        flowPos = clampPos(flowPos);
        velocity = 0;
        targetPos = Math.round(flowPos);
      } else if (Math.abs(velocity) < 0.006){
        velocity = 0;
        targetPos = Math.round(flowPos);
      }
    }
  }

  layoutCoversAt(flowPos);
  syncNearest();
  requestAnimationFrame(tick);
}

/* ---------- content rendering ---------- */
function renderInfo(){
  const rel = releases[activeIndex];
  const totalSecs = rel.tracks.reduce((sum, t) => sum + parseDuration(t.duration), 0);
  relTitle.textContent = rel.title;
  const trackWord = rel.tracks.length === 1 ? 'track' : 'tracks';
  relMeta.innerHTML = `${rel.year}<span>·</span>${rel.type || 'Album'}<span>·</span>${rel.tracks.length} ${trackWord}<span>·</span>${formatDuration(totalSecs)}`;
}

function renderTracks(){
  const rel = releases[activeIndex];
  trackPanel.innerHTML = '';
  rel.tracks.forEach((t, idx) => {
    const row = document.createElement('div');
    row.className = 'track-row';
    if (activeIndex === currentTrack.relIdx && idx === currentTrack.trackIdx && isPlaying) {
      row.classList.add('playing');
    }
    row.innerHTML = `
      <div class="track-num">${idx+1}</div>
      <div class="track-name">${t.title}</div>
      <div class="track-len">${t.duration}</div>
    `;
    row.addEventListener('click', () => playTrack(activeIndex, idx));
    trackPanel.appendChild(row);
  });
}

/* ---------- playback ---------- */
function playTrack(relIdx, trackIdx){
  const rel = releases[relIdx];
  const track = rel.tracks[trackIdx];
  currentTrack = { relIdx, trackIdx };

  if (!track.src) {
    nowPlaying.innerHTML = `<strong>${track.title}</strong> — no audio file linked yet. Add a "src" path in the code to enable playback.`;
    isPlaying = false;
    updatePlayIcon();
    renderTracks();
    return;
  }

  audio.src = track.src;
  audio.play().then(() => {
    isPlaying = true;
    updatePlayIcon();
    renderTracks();
  }).catch(() => {
    nowPlaying.innerHTML = `<strong>${track.title}</strong> — couldn't play this file. Check the src path.`;
  });
  nowPlaying.innerHTML = `<strong>${track.title}</strong> — ${rel.title}`;
}

function togglePlay(){
  if (currentTrack.relIdx === -1) {
    if (releases[activeIndex].tracks.length) playTrack(activeIndex, 0);
    return;
  }
  if (!audio.src) { playTrack(currentTrack.relIdx, currentTrack.trackIdx); return; }
  if (isPlaying){
    audio.pause();
    isPlaying = false;
  } else {
    audio.play().catch(()=>{});
    isPlaying = true;
  }
  updatePlayIcon();
  renderTracks();
}

function updatePlayIcon(){
  playIcon.innerHTML = isPlaying ? ICON_PAUSE : ICON_PLAY;
}

function stepTrack(dir){
  if (currentTrack.relIdx === -1) return;
  const rel = releases[currentTrack.relIdx];
  let next = currentTrack.trackIdx + dir;
  if (next < 0) next = 0;
  if (next >= rel.tracks.length) next = rel.tracks.length - 1;
  playTrack(currentTrack.relIdx, next);
}

/* ---------- helpers ---------- */
function parseDuration(str){
  const p = str.split(':').map(Number);
  if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
  return p[0] * 60 + p[1];
}
function formatDuration(totalSecs){
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}
function formatTime(s){
  s = Math.floor(s || 0);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

/* ---------- transport events ---------- */
playBtn.addEventListener('click', togglePlay);
document.getElementById('nextBtn').addEventListener('click', () => stepTrack(1));
document.getElementById('prevBtn').addEventListener('click', () => stepTrack(-1));

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  curTimeEl.textContent = formatTime(audio.currentTime);
  durTimeEl.textContent = formatTime(audio.duration);
});
audio.addEventListener('ended', () => stepTrack(1));

progressBar.addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

/* ---------- drag: covers attached to your hand ---------- */
let dragStartX = 0, dragStartPos = 0, lastX = 0, lastT = 0, pxVelocity = 0;
let coverStepPx = 260;

function getStepPx(){
  const w = flow.firstElementChild;
  const cw = w ? w.getBoundingClientRect().width : 260;
  return cw * 1.15;
}

function onDragStart(clientX){
  isDragging = true;
  targetPos = null;       // grabbing mid-glide takes over immediately
  velocity = 0;
  dragStartX = clientX;
  dragStartPos = flowPos;
  lastX = clientX;
  lastT = performance.now();
  pxVelocity = 0;
  coverStepPx = getStepPx();
  stage.classList.add('grabbing');
}

function onDragMove(clientX){
  if (!isDragging) return;
  const now = performance.now();
  const dt = now - lastT;
  if (dt > 0){
    pxVelocity = (clientX - lastX) / dt; // px per ms
    lastX = clientX;
    lastT = now;
  }
  const dx = clientX - dragStartX;
  // soft resistance past the ends instead of a hard stop
  let p = dragStartPos - dx / coverStepPx;
  if (p < 0) p = p * 0.3;
  if (p > MAX_IDX) p = MAX_IDX + (p - MAX_IDX) * 0.3;
  flowPos = p;
}

function onDragEnd(clientX){
  if (!isDragging) return;
  isDragging = false;
  stage.classList.remove('grabbing');

  flowPos = clampPos(flowPos);
  const totalMoved = Math.abs(clientX - dragStartX);
  if (totalMoved < 6){
    // simple tap — click handler picks the exact cover
    targetPos = Math.round(flowPos);
    return;
  }
  // hand the release velocity to the physics loop (px/ms -> covers/frame)
  velocity = -(pxVelocity * 16.7) / coverStepPx;
  if (Math.abs(velocity) < 0.008){
    velocity = 0;
    targetPos = Math.round(flowPos);
  }
}

stage.addEventListener('mousedown', (e) => { e.preventDefault(); onDragStart(e.clientX); });
window.addEventListener('mousemove', (e) => { if (isDragging) onDragMove(e.clientX); });
window.addEventListener('mouseup', (e) => { if (isDragging) onDragEnd(e.clientX); });

stage.addEventListener('touchstart', (e) => onDragStart(e.touches[0].clientX), {passive:true});
stage.addEventListener('touchmove', (e) => { if (isDragging) onDragMove(e.touches[0].clientX); }, {passive:true});
stage.addEventListener('touchend', (e) => onDragEnd(e.changedTouches[0].clientX), {passive:true});

/* tap a specific cover to fly to it */
flow.addEventListener('click', (e) => {
  if (Math.abs(lastX - dragStartX) > 6) return;
  const hit = document.elementFromPoint(e.clientX, e.clientY);
  const wrap = hit ? hit.closest('.cover-wrap') : null;
  if (!wrap) return;
  targetPos = parseInt(wrap.dataset.index);
  velocity = 0;
});

/* trackpad / wheel: continuous, then settle */
let wheelSnapTimer = null;
stage.addEventListener('wheel', (e) => {
  if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) return;
  e.preventDefault();
  targetPos = null;
  velocity = 0;
  flowPos = clampPos(flowPos + e.deltaX / 220);
  clearTimeout(wheelSnapTimer);
  wheelSnapTimer = setTimeout(() => { targetPos = Math.round(flowPos); }, 120);
}, {passive:false});

/* keyboard */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft'){ velocity = 0; targetPos = Math.max(0, (targetPos ?? Math.round(flowPos)) - 1); }
  if (e.key === 'ArrowRight'){ velocity = 0; targetPos = Math.min(MAX_IDX, (targetPos ?? Math.round(flowPos)) + 1); }
  if (e.key === ' '){ e.preventDefault(); togglePlay(); }
});

window.addEventListener('resize', () => { coverStepPx = getStepPx(); layoutCoversAt(flowPos); });
window.addEventListener('orientationchange', () => { setTimeout(() => { coverStepPx = getStepPx(); layoutCoversAt(flowPos); }, 300); });

/* ---------- init ---------- */
buildCovers();
releases.forEach((_, i) => computeAlbumColor(i));
flowPos = 0;
syncNearest();       // renders info/tracks, sets glow
requestAnimationFrame(tick);
</script>
